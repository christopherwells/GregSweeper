<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dumbbell: the universal gym icon. Greg-green weights,
       steel grip, bold silhouette reads at any size. -->
  <g transform="rotate(-5,64,64)">
    <!-- Grip bar -->
    <rect x="20" y="56" width="88" height="16" rx="8"
          fill="#9a9a9a" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
    <!-- Left weight -->
    <rect x="8" y="26" width="26" height="76" rx="9"
          fill="#3a6a3a" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
    <!-- Right weight -->
    <rect x="94" y="26" width="26" height="76" rx="9"
          fill="#3a6a3a" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
    <!-- Weight highlights -->
    <rect x="14" y="34" width="8" height="26" rx="4" fill="#4a8a4a" opacity="0.35"/>
    <rect x="100" y="34" width="8" height="26" rx="4" fill="#4a8a4a" opacity="0.35"/>
    <!-- Grip knurl marks -->
    <g stroke="#7a7a7a" stroke-width="2" stroke-linecap="round" opacity="0.45">
      <line x1="44" y1="58" x2="44" y2="70"/>
      <line x1="52" y1="58" x2="52" y2="70"/>
      <line x1="64" y1="58" x2="64" y2="70"/>
      <line x1="76" y1="58" x2="76" y2="70"/>
      <line x1="84" y1="58" x2="84" y2="70"/>
    </g>
  </g>
</svg>
