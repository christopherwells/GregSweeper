<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Flexed arm curling a dumbbell. Layered strokes
       with a circle bicep inside the bend. -->

  <!-- === Dark outline layer === -->
  <path d="M 58 28 L 36 74 L 84 88"
        stroke="#232838" stroke-width="34" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
  <circle cx="68" cy="56" r="26" fill="#232838"/>

  <!-- === Skin fill layer === -->
  <path d="M 58 28 L 36 74 L 84 88"
        stroke="#d4a068" stroke-width="26" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
  <circle cx="68" cy="56" r="22" fill="#d4a068"/>

  <!-- Bicep highlight -->
  <circle cx="64" cy="50" r="10" fill="#e0b888" opacity="0.35"/>

  <!-- === Dumbbell === -->
  <rect x="35" y="16" width="46" height="8" rx="4"
        fill="#9a9a9a" stroke="#232838" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="27" y="6" width="14" height="26" rx="5"
        fill="#3a6a3a" stroke="#232838" stroke-width="4" stroke-linejoin="round"/>
  <rect x="67" y="6" width="14" height="26" rx="5"
        fill="#3a6a3a" stroke="#232838" stroke-width="4" stroke-linejoin="round"/>
</svg>
