        fill="none" stroke="#232838" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 46 Q40 16 64 14 Q88 16 88 46"
        fill="none" stroke="#4a7a4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="64" cy="80" rx="46" ry="40" fill="#3a6a3a" stroke="#232838" stroke-width="5"/>
  <ellipse cx="50" cy="70" rx="18" ry="14" fill="#4a8a4a" opacity="0.35" transform="rotate(-18,50,70)"/>
  <g stroke="#2a5a2a" stroke-width="2.5" stroke-linecap="round" opacity="0.3">
    <path d="M64 50 Q50 62 38 80"/>
    <path d="M64 50 Q78 62 90 80"/>
    <path d="M64 50 L64 86"/>
    <path d="M64 50 Q44 56 30 74"/>
    <path d="M64 50 Q84 56 98 74"/>
  </g>
  <ellipse cx="64" cy="100" rx="28" ry="5" fill="#2a5a2a" opacity="0.25"/>
