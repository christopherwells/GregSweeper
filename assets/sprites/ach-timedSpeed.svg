<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <!-- Speedrunner: a Mario-style ? block on a 16x16 grid (8px cells). -->
  <!-- Body + bevel edges -->
  <rect x="0" y="0" width="128" height="128" fill="#f4b528"/>
  <rect x="0" y="0" width="128" height="8" fill="#f57f1a"/>
  <rect x="0" y="0" width="8" height="128" fill="#f57f1a"/>
  <rect x="0" y="120" width="128" height="8" fill="#161616"/>
  <rect x="120" y="0" width="8" height="128" fill="#161616"/>
  <rect x="0" y="0" width="8" height="8" fill="#161616"/>
  <!-- Corner rivets -->
  <g fill="#161616">
    <rect x="16" y="16" width="8" height="8"/><rect x="104" y="16" width="8" height="8"/>
    <rect x="16" y="104" width="8" height="8"/><rect x="104" y="104" width="8" height="8"/>
  </g>
  <!-- "?" shadow -->
  <g fill="#161616">
    <rect x="48" y="32" width="32" height="8"/>
    <rect x="40" y="40" width="16" height="8"/><rect x="72" y="40" width="16" height="8"/>
    <rect x="72" y="48" width="16" height="8"/>
    <rect x="64" y="56" width="16" height="8"/>
    <rect x="56" y="64" width="16" height="8"/>
    <rect x="56" y="72" width="16" height="8"/>
    <rect x="56" y="80" width="16" height="8"/>
    <rect x="56" y="96" width="16" height="8"/>
  </g>
  <!-- "?" orange -->
  <g fill="#f57f1a">
    <rect x="40" y="24" width="32" height="8"/>
    <rect x="32" y="32" width="16" height="8"/><rect x="64" y="32" width="16" height="8"/>
    <rect x="64" y="40" width="16" height="8"/>
    <rect x="56" y="48" width="16" height="8"/>
    <rect x="48" y="56" width="16" height="8"/>
    <rect x="48" y="64" width="16" height="8"/>
    <rect x="48" y="72" width="16" height="8"/>
    <rect x="48" y="88" width="16" height="8"/>
  </g>
  <rect x="0" y="0" width="128" height="128" fill="none" stroke="#161616" stroke-width="2"/>
</svg>
