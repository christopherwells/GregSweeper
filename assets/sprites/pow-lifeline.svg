<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2.11 -2.11 132.22 132.22">
  <!-- Lifeline: a life ring — the thing that catches you. (The marine
       option from the inventory; reads instantly and avoids the
       heart-equals-health confusion.) -->
  <circle cx="64" cy="64" r="44" fill="#f25c4a" stroke="#232838" stroke-width="6"/>
  <circle cx="64" cy="64" r="20" fill="#dff0f7" stroke="#232838" stroke-width="6"/>
  <!-- Quadrant stripes -->
  <g stroke="#f7f3ea" stroke-width="14">
    <path d="M64 26 L64 42" />
    <path d="M64 86 L64 102"/>
    <path d="M26 64 L42 64"/>
    <path d="M86 64 L102 64"/>
  </g>
  <!-- Rope around the ring -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#c8a468" stroke-width="4" stroke-dasharray="10 9"/>
  <path d="M34 36 A44 44 0 0 1 60 22" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
</svg>
