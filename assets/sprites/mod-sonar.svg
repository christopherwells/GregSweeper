<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Sonar: a satellite dish / radar with expanding scan waves.
       The wider-range scan concept — sees a 5x5 area instead of 3x3. -->
  <!-- Expanding scan rings -->
  <g fill="none" stroke="#26c6da" stroke-linecap="round" opacity="0.5">
    <circle cx="64" cy="62" r="48" stroke-width="3"/>
    <circle cx="64" cy="62" r="36" stroke-width="3.5" opacity="0.65"/>
  </g>
  <!-- Dish base / mount -->
  <rect x="58" y="86" width="12" height="28" rx="3" fill="#5a6275" stroke="#232838" stroke-width="4"/>
  <rect x="42" y="108" width="44" height="10" rx="4" fill="#4a5265" stroke="#232838" stroke-width="4"/>
  <!-- Dish (parabolic bowl) -->
  <path d="M24 70 Q32 28 64 22 Q96 28 104 70"
        fill="#7ecfe0" stroke="#232838" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner dish highlight -->
  <path d="M36 64 Q44 36 64 30 Q84 36 92 64"
        fill="#a8e4ef" stroke="none"/>
  <!-- Feed point (the antenna nub at the focus) -->
  <circle cx="64" cy="56" r="6" fill="#26c6da" stroke="#232838" stroke-width="4"/>
  <line x1="64" y1="62" x2="64" y2="86" stroke="#232838" stroke-width="3.5"/>
</svg>
