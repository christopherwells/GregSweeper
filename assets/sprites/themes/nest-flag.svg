<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<!-- A feather: a central shaft with barbs combing out from it toward the tip. -->
<!-- vane, two halves around the shaft -->
<path d='M29 11 C19 19 14 33 16 49 C23 46 29 41 32 31 Z' fill='#ef8163' stroke='#3a2e1e' stroke-width='2.6' stroke-linejoin='round'/>
<path d='M29 11 C39 18 44 31 42 45 C35 43 31 39 32 31 Z' fill='#e1573c' stroke='#3a2e1e' stroke-width='2.6' stroke-linejoin='round'/>
<!-- barbs: emanate from the shaft, angled up toward the tip -->
<g stroke='#a83a24' stroke-width='1.1' stroke-linecap='round'>
  <path d='M30 18 L25 14 M31 25 L23 20 M31.5 32 L22 29 M32 39 L24 38 M32.5 45 L26 47'/>
  <path d='M30 18 L35 13 M31 25 L40 19 M31.5 32 L41 28 M32 39 L41 37'/>
</g>
<!-- shaft (rachis) drawn on top so the barbs read as coming from it, + a quill -->
<path d='M29 12 L34 51' fill='none' stroke='#6a4a28' stroke-width='2.6' stroke-linecap='round'/>
<path d='M34 51 L37 56' fill='none' stroke='#c8a468' stroke-width='2.8' stroke-linecap='round'/>
</svg>
