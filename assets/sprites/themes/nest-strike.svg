<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<!-- A folded omelette: the egg, cooked. The detonated mine. -->
<!-- plate hint -->
<ellipse cx='32' cy='46' rx='24' ry='6' fill='#e7eef2' stroke='#b9c6cd' stroke-width='2'/>
<!-- omelette: a folded half-disc -->
<path d='M9 44 Q14 22 32 22 Q50 22 55 44 Q55 47 50 47 L14 47 Q9 47 9 44 Z'
      fill='#f6c542' stroke='#c98f24' stroke-width='2.8' stroke-linejoin='round'/>
<!-- browned fold + sheen -->
<path d='M16 40 Q32 30 48 40' fill='none' stroke='#dca42e' stroke-width='2.4' stroke-linecap='round'/>
<path d='M20 33 Q26 28 33 29' fill='none' stroke='#ffe6a0' stroke-width='2.4' stroke-linecap='round' opacity='0.8'/>
<!-- chive flecks -->
<g fill='#5a8a3a'>
  <ellipse cx='38' cy='37' rx='2.4' ry='1.1' transform='rotate(28 38 37)'/>
  <ellipse cx='27' cy='41' rx='2.2' ry='1' transform='rotate(-20 27 41)'/>
</g>
</svg>
