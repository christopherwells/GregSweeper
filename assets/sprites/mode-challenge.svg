<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Challenge: the climb. A summit with the flag planted and a
       checkpoint path of tiles working up the face — 120 levels,
       checkpoints every 5. Says "progression," not "tool." -->
  <!-- Mountain -->
  <path d="M10 112 L52 32 L74 70 L88 52 L118 112 Z" fill="#5d8ad8" stroke="#232838" stroke-width="6" stroke-linejoin="round"/>
  <path d="M52 32 L62 50 L52 58 L44 47 Z" fill="#eef3fb" stroke="#232838" stroke-width="4" stroke-linejoin="round"/>
  <path d="M88 52 L96 66 L84 64 Z" fill="#eef3fb"/>
  <path d="M52 32 L74 70 L88 52 L118 112 L74 112 Z" fill="#3a5fa6" opacity="0.55"/>
  <!-- Checkpoint path: tiles stepping up the slope -->
  <g stroke="#232838" stroke-width="3.5" stroke-linejoin="round">
    <rect x="30" y="96" width="13" height="13" rx="3" fill="#dfe5ee"/>
    <rect x="44" y="80" width="13" height="13" rx="3" fill="#dfe5ee"/>
    <rect x="38" y="62" width="13" height="13" rx="3" fill="#5ad07a"/>
  </g>
  <!-- Summit flag -->
  <path d="M52 30 L52 8" stroke="#232838" stroke-width="5" stroke-linecap="round"/>
  <path d="M52 9 L72 14 L52 21 Z" fill="#e4453a" stroke="#232838" stroke-width="4" stroke-linejoin="round"/>
</svg>
