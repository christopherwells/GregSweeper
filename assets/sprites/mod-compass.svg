<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Compass: a classic compass rose with a bold needle. Points in a
       direction and counts mines across the board that way. -->
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="48" fill="#f0ead6" stroke="#232838" stroke-width="5"/>
  <!-- Inner ring -->
  <circle cx="64" cy="64" r="40" fill="#f7f3e8" stroke="#232838" stroke-width="3"/>
  <!-- Cardinal tick marks -->
  <g stroke="#232838" stroke-width="3.5" stroke-linecap="round">
    <line x1="64" y1="16" x2="64" y2="28"/>
    <line x1="64" y1="100" x2="64" y2="112"/>
    <line x1="16" y1="64" x2="28" y2="64"/>
    <line x1="100" y1="64" x2="112" y2="64"/>
  </g>
  <!-- Compass needle (N = red point, S = slate) -->
  <path d="M64 24 L70 64 L64 56 L58 64 Z" fill="#e4453a" stroke="#232838" stroke-width="3" stroke-linejoin="round"/>
  <path d="M64 104 L70 64 L64 72 L58 64 Z" fill="#5a6275" stroke="#232838" stroke-width="3" stroke-linejoin="round"/>
  <!-- Center pivot -->
  <circle cx="64" cy="64" r="5" fill="#d4a843" stroke="#232838" stroke-width="3"/>
  <!-- Direction letter (N) -->
  <text x="64" y="22" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#ffa726">N</text>
</svg>
