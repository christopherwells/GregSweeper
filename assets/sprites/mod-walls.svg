<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Walls: two cell-like blocks separated by a thick impassable wall.
       The wall bisects the icon vertically, each side shows a tile with
       a number — the wall makes them strangers. -->
  <!-- Left tile -->
  <rect x="10" y="28" width="44" height="72" rx="7" fill="#b0c4de" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
  <text x="32" y="76" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="36" fill="#232838">1</text>
  <!-- Right tile -->
  <rect x="74" y="28" width="44" height="72" rx="7" fill="#b0c4de" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
  <text x="96" y="76" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="36" fill="#232838">0</text>
  <!-- The wall: thick vertical bar with brick texture -->
  <rect x="54" y="18" width="20" height="92" rx="3" fill="#8B7355" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
  <line x1="54" y1="42" x2="74" y2="42" stroke="#232838" stroke-width="2.5"/>
  <line x1="54" y1="64" x2="74" y2="64" stroke="#232838" stroke-width="2.5"/>
  <line x1="54" y1="86" x2="74" y2="86" stroke="#232838" stroke-width="2.5"/>
  <line x1="64" y1="18" x2="64" y2="42" stroke="#232838" stroke-width="2"/>
  <line x1="64" y1="64" x2="64" y2="86" stroke="#232838" stroke-width="2"/>
</svg>
