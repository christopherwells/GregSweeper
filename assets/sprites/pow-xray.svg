<svg xmlns="http://www.w3.org/2000/svg" viewBox="9.00 9.00 110.00 110.00">
  <!-- X-Ray: a scanner view showing the mine through the board — dark
       screen, cyan brackets, the bomb visible as a ghost. Changes the
       metaphor from the microscope emoji (which collided with
       Diagnostics). -->
  <rect x="18" y="18" width="92" height="92" rx="10" fill="#13223e" stroke="#232838" stroke-width="6"/>
  <!-- Corner brackets -->
  <g stroke="#5fe0ff" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M30 42 L30 30 L42 30"/>
    <path d="M86 30 L98 30 L98 42"/>
    <path d="M98 86 L98 98 L86 98"/>
    <path d="M42 98 L30 98 L30 86"/>
  </g>
  <!-- Ghosted mine seen through the board -->
  <g stroke="#5fe0ff" stroke-width="4" fill="none" opacity="0.9">
    <circle cx="64" cy="68" r="16"/>
    <path d="M64 46 L64 52 M64 84 L64 90 M42 68 L48 68 M80 68 L86 68 M50 54 L54 58 M78 78 L74 74 M78 58 L74 62 M50 82 L54 78" stroke-linecap="round"/>
    <path d="M64 52 C64 46 68 42 73 42" stroke-dasharray="3 4"/>
  </g>
  <!-- Scan beam -->
  <rect x="22" y="30" width="84" height="10" rx="4" fill="#5fe0ff" opacity="0.35"/>
</svg>
