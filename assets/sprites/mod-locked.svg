<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Locked: a padlock over a cell. Clear, classic, reads at any size. -->
  <!-- Cell behind the lock -->
  <rect x="22" y="54" width="84" height="62" rx="10" fill="#b0c4de" stroke="#232838" stroke-width="4" stroke-linejoin="round" opacity="0.45"/>
  <!-- Lock body -->
  <rect x="34" y="58" width="60" height="50" rx="8" fill="#d4a843" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
  <!-- Shackle -->
  <path d="M46 58 L46 38 Q46 18 64 18 Q82 18 82 38 L82 58"
        fill="none" stroke="#232838" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M50 58 L50 40 Q50 24 64 24 Q78 24 78 40 L78 58"
        fill="none" stroke="#c4943a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Keyhole -->
  <circle cx="64" cy="78" r="7" fill="#232838"/>
  <rect x="61" y="78" width="6" height="14" rx="2" fill="#232838"/>
</svg>
