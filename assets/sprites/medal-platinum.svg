<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Speed-rating medal: platinum. Same family ribbon + disc as
       bronze/silver/gold, but the metal is cool white-silver with a
       polished sheen — between gold warmth and diamond sparkle. -->
  <g stroke="#232838" stroke-width="5" stroke-linejoin="round">
    <path d="M42 8 L60 8 L67 42 L46 48 Z" fill="#46506b"/>
    <path d="M86 8 L68 8 L61 42 L82 48 Z" fill="#3a4258"/>
  </g>
  <circle cx="64" cy="79" r="37" fill="#b0b5be" stroke="#232838" stroke-width="5"/>
  <circle cx="64" cy="79" r="29" fill="#dce0e5"/>
  <path d="M42 64 A29 29 0 0 1 78 54" fill="none" stroke="#f0f2f5" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M64 63 L68.1 73.3 L79.2 74.1 L70.7 81.2 L73.4 91.9 L64 86 L54.6 91.9 L57.3 81.2 L48.8 74.1 L59.9 73.3 Z"
        fill="#b0b5be" stroke="#8a8f98" stroke-width="2" stroke-linejoin="round"/>
  <!-- Subtle sparkle — platinum's polish -->
  <path d="M88 50 L90 56 L96 58 L90 60 L88 66 L86 60 L80 58 L86 56 Z" fill="#ffffff" opacity="0.8"/>
</svg>
