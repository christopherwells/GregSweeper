  <!-- Flag, centered on the white field -->
  <rect x="46" y="42" width="9" height="46" rx="4.5" fill="#34343c" stroke="#232838" stroke-width="2.5"/>
  <path d="M55 45 L82 56 L55 67 Z" fill="#d4291c" stroke="#232838" stroke-width="3.5" stroke-linejoin="round"/>
