<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Mine Shift: a small bomb drifting from left to right with speed
       lines behind it. Movement, not explosion. -->
  <!-- Speed lines (trailing the bomb) -->
  <g stroke="#8a9bb5" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="12" y1="48" x2="38" y2="48"/>
    <line x1="8" y1="64" x2="42" y2="64"/>
    <line x1="14" y1="80" x2="36" y2="80"/>
  </g>
  <!-- Arrow showing direction -->
  <path d="M44 64 L56 64" stroke="#5d8ad8" stroke-width="5" stroke-linecap="round"/>
  <path d="M52 56 L60 64 L52 72" fill="none" stroke="#5d8ad8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bomb body (shifted right, in motion) -->
  <circle cx="86" cy="64" r="24" fill="#3a3d45" stroke="#232838" stroke-width="5"/>
  <path d="M86 40 L86 30" stroke="#232838" stroke-width="5" stroke-linecap="round"/>
  <circle cx="86" cy="26" r="5" fill="#e4453a"/>
  <!-- Highlight -->
  <ellipse cx="78" cy="54" rx="6" ry="4" fill="#6a6e78" opacity="0.7" transform="rotate(-30,78,54)"/>
</svg>
