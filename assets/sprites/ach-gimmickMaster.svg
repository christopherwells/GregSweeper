<svg xmlns="http://www.w3.org/2000/svg" viewBox="3.69 2.57 120.62 120.62">
  <!-- Modifier Master: a fan of the actual modifier tiles, centered glyphs. -->
  <!-- Left chip: wormhole spiral -->
  <g transform="rotate(-20 38 64)">
    <rect x="20" y="41" width="36" height="46" rx="7" fill="#5d8ad8" stroke="#232838" stroke-width="5.5"/>
    <path d="M38 53 A11 11 0 1 1 27 64 A6.5 6.5 0 1 1 38 57.5 A2.4 2.4 0 1 1 35.6 64"
          fill="none" stroke="#f3f6fb" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <!-- Right chip: locked padlock -->
  <g transform="rotate(20 90 64)">
    <rect x="72" y="41" width="36" height="46" rx="7" fill="#c89030" stroke="#232838" stroke-width="5.5"/>
    <path d="M82 62 L82 56 A8 8 0 0 1 98 56 L98 62" fill="none" stroke="#232838" stroke-width="4.5"/>
    <rect x="78" y="62" width="24" height="20" rx="3" fill="#f3f6fb" stroke="#232838" stroke-width="4"/>
    <circle cx="90" cy="71" r="2.6" fill="#232838"/>
  </g>
  <!-- Center chip: mystery -->
  <rect x="46" y="34" width="36" height="48" rx="7" fill="#9b6dd0" stroke="#232838" stroke-width="6"/>
  <path d="M56 52 A8 8 0 1 1 64 60 L64 66" fill="none" stroke="#f3f6fb" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="64" cy="74" r="3.2" fill="#f3f6fb"/>
