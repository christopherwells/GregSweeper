<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Supernova Greg, idle: a crab of star-stuff. A burning core for a shell, burst rays for the carapace, light-ray limbs, blazing eyes. -->
<!-- Light-ray legs / arms / stalks -->
<g fill="none" stroke="#ffd9a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/><path d="M24 43.5 L20 50 L19 55"/><path d="M45 41 L51 47 L53 52"/><path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/><path d="M47 32 L52 26"/><path d="M25 18.5 L23 12.5"/><path d="M39 18.5 L41 12.5"/>
</g>
<!-- Claws as bright shards -->
<path d="M9 24 L17 20 L14 25 L18 24 Z" fill="#ffe9c4" stroke="#ffb86a" stroke-width="1.4" stroke-linejoin="round"/>
<path d="M55 25 L47 21 L50 26 L46 25 Z" fill="#ffe9c4" stroke="#ffb86a" stroke-width="1.4" stroke-linejoin="round"/>
<!-- Burst-ray carapace -->
<g fill="#ffb86a">
  <path d="M32 14 L35 26 L29 26 Z"/><path d="M50 18 L40 27 L43 23 Z"/><path d="M54 31 L42 30 L46 28 Z"/>
  <path d="M50 43 L41 35 L44 36 Z"/><path d="M32 47 L29 36 L35 36 Z"/><path d="M14 43 L23 35 L20 36 Z"/>
  <path d="M10 31 L22 30 L18 28 Z"/><path d="M14 18 L24 27 L21 23 Z"/>
</g>
<!-- Mid glow ring -->
<circle cx="32" cy="30" r="11" fill="#ffd9a3"/>
<circle cx="32" cy="30" r="7" fill="#fff4dd"/>
<!-- Smile -->
<path d="M28 31 Q32 35 36 31" fill="none" stroke="#d98a3a" stroke-width="2" stroke-linecap="round"/>
<!-- Blazing eyes on short ray stalks -->
<circle cx="22.5" cy="9.5" r="3.6" fill="#fff" opacity="0.4"/>
<circle cx="41.5" cy="9.5" r="3.6" fill="#fff" opacity="0.4"/>
<circle cx="22.5" cy="9.5" r="1.9" fill="#fff"/>
<circle cx="41.5" cy="9.5" r="1.9" fill="#fff"/>
<!-- Bright shard slate -->
<g transform="rotate(-12 8 31)">
  <path d="M3 21 L14 23 L13 38 L2 36 Z" fill="#ffe9c4" stroke="#ffb86a" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M5 27 L11 28 M5 31 L11 32" stroke="#d98a3a" stroke-width="1" opacity="0.6"/>
</g>
</svg>
