<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Synthwave Greg, idle: a sunset-gradient crab with scanlines, cyan outline, a perspective grid underfoot, a cassette slate. -->
<defs>
  <linearGradient id="swIdle" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ff3e8a"/>
    <stop offset="1" stop-color="#ff9a3e"/>
  </linearGradient>
</defs>
<!-- Perspective grid -->
<g stroke="#2bd6e0" stroke-width="1" opacity="0.5">
  <path d="M32 50 L10 60 M32 50 L22 60 M32 50 L42 60 M32 50 L54 60"/>
  <path d="M16 55 L48 55 M12 58 L52 58"/>
</g>
<!-- Limbs cyan -->
<g fill="none" stroke="#2bd6e0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/><path d="M24 43.5 L20 50 L19 55"/><path d="M45 41 L51 47 L53 52"/><path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/><path d="M47 32 L52 26"/><path d="M25 18.5 L23 12.5"/><path d="M39 18.5 L41 12.5"/>
</g>
<circle cx="22.5" cy="9.5" r="4.2" fill="#fff" stroke="#2bd6e0" stroke-width="1.8"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="#fff" stroke="#2bd6e0" stroke-width="1.8"/>
<circle cx="23.2" cy="10.2" r="1.6" fill="#1a0b2e"/>
<circle cx="40.8" cy="10.2" r="1.6" fill="#1a0b2e"/>
<ellipse cx="14" cy="21" rx="5.4" ry="4.4" fill="url(#swIdle)" stroke="#2bd6e0" stroke-width="1.8" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="5.8" ry="4.6" fill="url(#swIdle)" stroke="#2bd6e0" stroke-width="1.8" transform="rotate(-35 54 22)"/>
<!-- Gradient shell -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="url(#swIdle)" stroke="#2bd6e0" stroke-width="2.2"/>
<!-- Scanline gaps -->
<g fill="#1a0b2e" opacity="0.55"><rect x="11" y="24" width="42" height="1.6"/><rect x="11" y="30" width="42" height="1.6"/><rect x="11" y="36" width="42" height="1.6"/></g>
<!-- Smile -->
<path d="M27.5 31.5 Q32 36 36.5 31.5" fill="none" stroke="#1a0b2e" stroke-width="2" stroke-linecap="round"/>
<!-- Cassette slate -->
<g transform="rotate(-10 8 31)">
  <rect x="1.5" y="22" width="13" height="14" rx="1.5" fill="#2a1a3e" stroke="#2bd6e0" stroke-width="1.8"/>
  <circle cx="5.5" cy="29" r="2" fill="none" stroke="#ff3e8a" stroke-width="1.4"/>
  <circle cx="10.5" cy="29" r="2" fill="none" stroke="#ff3e8a" stroke-width="1.4"/>
  <path d="M3 24.5 L13 24.5" stroke="#ff9a3e" stroke-width="1"/>
</g>
</svg>
