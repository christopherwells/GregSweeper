<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Galaxy Greg, loss: the constellation inverted, legs to the sky,
     the eye stars gone dim and crossed out. A star falls. -->
<!-- Inverted shell polygon -->
<g fill="none" stroke="#ea80fc" stroke-width="1.4" opacity="0.85">
  <path d="M12 37 L20 49 L32 52.5 L44 49 L52 37 L44 33 L32 32 L20 33 Z"/>
</g>
<!-- Legs to the sky -->
<g fill="none" stroke="#82b1ff" stroke-width="1.2" opacity="0.8">
  <path d="M22 33 L17 26 L18.5 20"/>
  <path d="M28 32.5 L26 24 L29 18"/>
  <path d="M36 32.5 L38 24 L35 18"/>
  <path d="M42 33 L47 26 L45.5 20"/>
  <path d="M14 38 L8 35"/>
  <path d="M50 38 L56 35"/>
</g>
<!-- Limp claw clusters -->
<g fill="none" stroke="#ea80fc" stroke-width="1.3" opacity="0.85">
  <path d="M8 35 L4 30.5 L8 27"/>
  <path d="M56 35 L60 30.5 L56 27"/>
</g>
<!-- Flopped eye lines -->
<g fill="none" stroke="#82b1ff" stroke-width="1.2" opacity="0.8">
  <path d="M18 34 L13 28.5"/>
  <path d="M23 33.5 L21.5 26"/>
</g>
<!-- Dimmed, crossed-out eye stars -->
<circle cx="12.5" cy="26.5" r="3" fill="#ffd9ff" opacity="0.12"/>
<circle cx="21" cy="23.5" r="3" fill="#ffd9ff" opacity="0.12"/>
<path d="M10.8 24.8 L14.2 28.2 M14.2 24.8 L10.8 28.2" stroke="#e8d8ff" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
<path d="M19.3 21.8 L22.7 25.2 M22.7 21.8 L19.3 25.2" stroke="#e8d8ff" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
<!-- Joint stars -->
<g fill="#e8d8ff">
  <circle cx="12" cy="37" r="1.5"/>
  <circle cx="20" cy="49" r="1.4"/>
  <circle cx="32" cy="52.5" r="1.5"/>
  <circle cx="44" cy="49" r="1.4"/>
  <circle cx="52" cy="37" r="1.5"/>
  <circle cx="18.5" cy="20" r="1.1"/>
  <circle cx="29" cy="18" r="1.1"/>
  <circle cx="35" cy="18" r="1.1"/>
  <circle cx="45.5" cy="20" r="1.1"/>
  <circle cx="4" cy="30.5" r="1.2"/>
  <circle cx="60" cy="30.5" r="1.2"/>
</g>
<!-- A falling star, trailing down -->
<path d="M48 8 L42 16" stroke="#ffd9ff" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
<circle cx="41" cy="17.5" r="1.5" fill="#ffffff"/>
<g fill="#e8d8ff" opacity="0.7">
  <circle cx="8" cy="50" r="0.7"/>
  <circle cx="57" cy="52" r="0.7"/>
  <circle cx="12" cy="9" r="0.6"/>
  <circle cx="30" cy="6" r="0.7"/>
</g>
</svg>
