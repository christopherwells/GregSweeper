<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Inferno Greg, idle: obsidian crab veined with lava, embers rising, ember eyes, a cracked-stone tablet. -->
<g fill="none" stroke="#120b08" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/><path d="M24 43.5 L20 50 L19 55"/><path d="M45 41 L51 47 L53 52"/><path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/><path d="M47 32 L52 26"/><path d="M25 18.5 L23 12.5"/><path d="M39 18.5 L41 12.5"/>
</g>
<!-- Ember eyes -->
<circle cx="22.5" cy="9.5" r="3.4" fill="#ff7a26" opacity="0.4"/>
<circle cx="41.5" cy="9.5" r="3.4" fill="#ff7a26" opacity="0.4"/>
<circle cx="22.5" cy="9.5" r="2" fill="#ffd23e"/>
<circle cx="41.5" cy="9.5" r="2" fill="#ffd23e"/>
<!-- Claws (charcoal, red tips) -->
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="#2a201c" stroke="#120b08" stroke-width="2.4" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="#2a201c" stroke="#120b08" stroke-width="2.4" transform="rotate(-35 54 22)"/>
<path d="M9 18 L10.5 16" stroke="#a8431a" stroke-width="2" stroke-linecap="round"/>
<path d="M58 19 L56.5 17" stroke="#a8431a" stroke-width="2" stroke-linecap="round"/>
<!-- Obsidian shell -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="#2a201c" stroke="#120b08" stroke-width="2.6"/>
<!-- Branching lava cracks -->
<g fill="none" stroke="#ff7a26" stroke-width="1.6" stroke-linecap="round">
  <path d="M32 21 L29 27 L31 31 L27 36"/>
  <path d="M29 27 L23 28"/>
  <path d="M31 31 L37 32 L41 29"/>
  <path d="M27 36 L33 37"/>
  <path d="M18 25 L22 30"/>
  <path d="M46 26 L42 31"/>
</g>
<!-- Smile (lava line) -->
<path d="M28 33 Q32 36.5 36 33" fill="none" stroke="#ff7a26" stroke-width="2" stroke-linecap="round"/>
<!-- Cracked stone tablet -->
<g transform="rotate(-10 8 31)">
  <rect x="2" y="21" width="12" height="16" rx="1" fill="#3a322c" stroke="#120b08" stroke-width="2"/>
  <path d="M8 21 L6 28 L9 33 L7 37" stroke="#ff7a26" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</g>
<!-- Embers rising -->
<g fill="#ffb347"><circle cx="50" cy="13" r="1.4"/><circle cx="55" cy="8" r="1"/><circle cx="46" cy="9" r="0.8"/></g>
</svg>
