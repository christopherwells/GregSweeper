<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Cartography Greg, loss: capsized under the swell, X eyes in red
     ink, the chart adrift. -->
<g fill="none" stroke="#5c4020" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
  <path d="M21 37 L17 30 L19 25"/>
  <path d="M27.5 36 L25.5 28 L28.5 23"/>
  <path d="M36.5 36 L38.5 28 L35.5 23"/>
  <path d="M43 37 L47 30 L45 25"/>
</g>
<g fill="none" stroke="#5c4020" stroke-width="3.2" stroke-linecap="round">
  <path d="M15 41 L9 38"/>
  <path d="M49 41 L55 38"/>
</g>
<ellipse cx="6.5" cy="35.5" rx="5.2" ry="4.2" fill="none" stroke="#5c4020" stroke-width="2.4" transform="rotate(-30 6.5 35.5)"/>
<ellipse cx="57.5" cy="35.5" rx="5.2" ry="4.2" fill="none" stroke="#5c4020" stroke-width="2.4" transform="rotate(30 57.5 35.5)"/>
<!-- Capsized hull -->
<path d="M12 40 C12 44 15 48 20 50.5 Q26 53 32 53 Q38 53 44 50.5 C49 48 52 44 52 40 L52 39 L12 39 Z"
      fill="none" stroke="#5c4020" stroke-width="2.8" stroke-linejoin="round"/>
<ellipse cx="32" cy="39" rx="20" ry="3.8" fill="none" stroke="#5c4020" stroke-width="1.8"/>
<path d="M20 46 L24 42 M27 48.5 L31 44.5 M34 48.5 L38 44.5 M41 46 L45 42"
      stroke="#5c4020" stroke-width="1.3" opacity="0.6"/>
<!-- Flopped stalks + red X eyes -->
<g fill="none" stroke="#5c4020" stroke-width="2.8" stroke-linecap="round">
  <path d="M17 39 L11.5 32"/>
  <path d="M22.5 38 L21 29.5"/>
</g>
<circle cx="10.5" cy="28.5" r="4" fill="#ebdcb8" stroke="#5c4020" stroke-width="2.2"/>
<path d="M8.9 26.9 L12.1 30.1 M12.1 26.9 L8.9 30.1" stroke="#8a3020" stroke-width="1.7" stroke-linecap="round"/>
<circle cx="20.5" cy="26" r="4" fill="#ebdcb8" stroke="#5c4020" stroke-width="2.2"/>
<path d="M18.9 24.4 L22.1 27.6 M22.1 24.4 L18.9 27.6" stroke="#8a3020" stroke-width="1.7" stroke-linecap="round"/>
<!-- The chart adrift -->
<g transform="rotate(8 50 59)">
  <rect x="41" y="55" width="16" height="8" rx="1" fill="#ebdcb8" stroke="#5c4020" stroke-width="1.8"/>
  <path d="M46 57 L49.5 60.5 M49.5 57 L46 60.5" stroke="#8a3020" stroke-width="1.4" stroke-linecap="round"/>
</g>
<!-- Sounding marks where he went down -->
<circle cx="30" cy="9" r="1" fill="#6a4a26"/>
<circle cx="35" cy="7" r="0.8" fill="#6a4a26"/>
<circle cx="39" cy="10" r="0.7" fill="#6a4a26"/>
</svg>
