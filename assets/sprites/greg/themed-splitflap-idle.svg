<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Splitflap Greg, idle: the carapace is a split-flap display tile, face printed across the fold, one flap caught mid-flip. -->
<!-- Dark frame legs / arms / stalks -->
<g fill="none" stroke="#1c1f26" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<!-- Metal claws -->
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="#3a3f4a" stroke="#1c1f26" stroke-width="2.2" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="#3a3f4a" stroke="#1c1f26" stroke-width="2.2" transform="rotate(-35 54 22)"/>
<!-- Indicator stalks -->
<circle cx="22.5" cy="9.5" r="3.4" fill="#2a2d36" stroke="#1c1f26" stroke-width="1.6"/>
<circle cx="41.5" cy="9.5" r="3.4" fill="#2a2d36" stroke="#1c1f26" stroke-width="1.6"/>
<circle cx="22.5" cy="9.5" r="1.4" fill="#e8b73a"/>
<circle cx="41.5" cy="9.5" r="1.4" fill="#e8b73a"/>
<!-- Display-tile carapace -->
<rect x="11" y="16" width="42" height="28" rx="5" fill="#2a2d36" stroke="#1c1f26" stroke-width="2.4"/>
<!-- The split-flap fold seam across the middle -->
<rect x="11" y="29" width="42" height="2.4" fill="#11141a"/>
<rect x="11" y="31.4" width="42" height="1.4" fill="#454a56"/>
<!-- Face printed on the flaps -->
<circle cx="24" cy="24" r="3" fill="#f2f3f5"/><circle cx="40" cy="24" r="3" fill="#f2f3f5"/>
<circle cx="24.7" cy="24.5" r="1.3" fill="#1c1f26"/><circle cx="40.7" cy="24.5" r="1.3" fill="#1c1f26"/>
<path d="M27 37 Q32 41 37 37" fill="none" stroke="#e8b73a" stroke-width="2.4" stroke-linecap="round"/>
<!-- One flap caught mid-flip, top-right -->
<g transform="translate(48 12)">
  <path d="M0 0 L9 -2 L8 5 L-1 7 Z" fill="#3a3f4a" stroke="#1c1f26" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M-0.5 3.5 L8.5 1.5" stroke="#11141a" stroke-width="1.4"/>
  <path d="M11 -2 L13 -3 M11 2 L13.5 2 M11 6 L13 7" stroke="#5a5e6a" stroke-width="1.2" stroke-linecap="round"/>
</g>
<!-- Departure-board prop -->
<g transform="rotate(-10 8 31)">
  <rect x="2" y="22" width="12" height="16" rx="1.5" fill="#1c1f26" stroke="#3a3f4a" stroke-width="1.6"/>
  <g fill="#e8b73a"><rect x="4" y="25" width="8" height="2.2" rx="0.5"/><rect x="4" y="29" width="6" height="2.2" rx="0.5"/><rect x="4" y="33" width="8" height="2.2" rx="0.5"/></g>
</g>
</svg>
