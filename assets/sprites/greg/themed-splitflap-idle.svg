<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Splitflap Greg, idle: the departures board sends Greg out as a little airplane, claws for wings, ready on the apron. -->
<!-- Swept wings (the claws) -->
<path d="M18 30 L2 35 L4 39 L20 35 Z" fill="#b8c0ca" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<path d="M46 30 L62 35 L60 39 L44 35 Z" fill="#b8c0ca" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<path d="M9 36 L7 39 M55 36 L57 39" stroke="#e0466b" stroke-width="1.6" stroke-linecap="round"/>
<!-- Tail fin -->
<path d="M30 17 L34 17 L33 7 L31 7 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<path d="M30 17 L34 17 L34 22 L30 22 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<!-- Fuselage / nose -->
<path d="M13 31 C13 23 19 17 32 16 C45 17 51 23 51 31 C51 39 44 44 32 44 C20 44 13 39 13 31 Z"
      fill="#e6ebf0" stroke="#3a4350" stroke-width="2.4"/>
<!-- Belly cheatline -->
<path d="M15 35 C20 41 27 43 32 43 C37 43 44 41 49 35 C46 40 39 41.5 32 41.5 C25 41.5 18 40 15 35 Z" fill="#3a78c8"/>
<path d="M14 32 Q32 30 50 32" stroke="#3a78c8" stroke-width="1.6" fill="none"/>
<!-- Propeller spinner at the nose -->
<g transform="rotate(20 32 44)"><path d="M32 38 L32 50 M26 44 L38 44" stroke="#3a4350" stroke-width="2.4" stroke-linecap="round"/></g>
<circle cx="32" cy="44" r="2.2" fill="#3a4350"/>
<!-- Cockpit-window eyes -->
<circle cx="24" cy="25" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
<circle cx="40" cy="25" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
<circle cx="24.7" cy="25.5" r="1.4" fill="#3a4350"/>
<circle cx="40.7" cy="25.5" r="1.4" fill="#3a4350"/>
<path d="M22.5 23.5 L24 22.5" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
<!-- Smile on the nose -->
<path d="M28 33 Q32 36 36 33" fill="none" stroke="#3a4350" stroke-width="2" stroke-linecap="round"/>
<!-- Landing gear wheels -->
<g fill="#2a2d36" stroke="#3a4350" stroke-width="1.2"><circle cx="22" cy="47" r="2.6"/><circle cx="42" cy="47" r="2.6"/><circle cx="32" cy="50" r="2.4"/></g>
<g stroke="#3a4350" stroke-width="1.4"><path d="M22 44 L22 45 M42 44 L42 45 M32 46 L32 48"/></g>
</svg>
