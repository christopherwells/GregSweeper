<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Sakura Greg, idle: a soft pink carapace with a single blossom crest, branch legs, a blossom tucked by one eye. -->
<!-- Branch legs / arms / stalks -->
<g fill="none" stroke="#8a6048" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<g fill="none" stroke="#8a6048" stroke-width="1.2" stroke-linecap="round"><path d="M16 44 L14 42 M48 44 L50 42 M21 49 L23 48"/></g>
<!-- Eyes -->
<circle cx="22.5" cy="9.5" r="4.2" fill="#fff" stroke="#8a6048" stroke-width="2"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="#fff" stroke="#8a6048" stroke-width="2"/>
<circle cx="23.2" cy="10.2" r="1.5" fill="#5a3a28"/>
<circle cx="40.8" cy="10.2" r="1.5" fill="#5a3a28"/>
<!-- Petal claws -->
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="#f4a7bd" stroke="#d07a96" stroke-width="1.8" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="#f4a7bd" stroke="#d07a96" stroke-width="1.8" transform="rotate(-35 54 22)"/>
<!-- Soft pink carapace -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="#f9c3d2" stroke="#d07a96" stroke-width="2.4"/>
<path d="M14 35 C18 40.5 27 42.5 32 42.5 C37 42.5 46 40.5 50 35 C47 41 39 43 32 43 C25 43 17 41 14 35 Z" fill="#f2aec0"/>
<!-- Smile -->
<path d="M27.5 36 Q32 39.5 36.5 36" fill="none" stroke="#b05a76" stroke-width="2" stroke-linecap="round"/>
<!-- Blossom crest on the shell -->
<g fill="#ffffff" stroke="#e89ab0" stroke-width="1.2">
  <ellipse cx="32" cy="22" rx="3" ry="4.4"/>
  <ellipse cx="38" cy="26" rx="3" ry="4.4" transform="rotate(72 38 26)"/>
  <ellipse cx="35.5" cy="32" rx="3" ry="4.4" transform="rotate(144 35.5 32)"/>
  <ellipse cx="28.5" cy="32" rx="3" ry="4.4" transform="rotate(216 28.5 32)"/>
  <ellipse cx="26" cy="26" rx="3" ry="4.4" transform="rotate(288 26 26)"/>
</g>
<circle cx="32" cy="27" r="2" fill="#ffd86a"/>
<!-- A blossom tucked by the left eye -->
<g fill="#ffffff" stroke="#e89ab0" stroke-width="1">
  <ellipse cx="16" cy="9" rx="1.8" ry="2.6"/>
  <ellipse cx="19" cy="11" rx="1.8" ry="2.6" transform="rotate(72 19 11)"/>
  <ellipse cx="14" cy="12" rx="1.8" ry="2.6" transform="rotate(216 14 12)"/>
</g>
<circle cx="16.5" cy="10.5" r="1" fill="#ffd86a"/>
<!-- Branch sprig prop -->
<g transform="rotate(-12 8 33)">
  <path d="M9 39 L7 26" stroke="#8a6048" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <g fill="#fff" stroke="#e89ab0" stroke-width="0.9"><circle cx="6" cy="25" r="2.4"/><circle cx="10" cy="28" r="2.4"/></g>
  <circle cx="6" cy="25" r="0.9" fill="#ffd86a"/><circle cx="10" cy="28" r="0.9" fill="#ffd86a"/>
</g>
</svg>
