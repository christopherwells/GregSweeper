<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Matrix Greg, idle: a crab resolved out of digital rain, glyph columns down the shell, brighter leading marks, a code-stream slate. -->
<!-- Faint crab outline in dim code-green -->
<g fill="none" stroke="#1f7a3a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<!-- Leg glyph ticks -->
<g stroke="#33ff66" stroke-width="1.4" stroke-linecap="round" opacity="0.85">
  <path d="M15 44 L17 44 M21 47 L23 47 M49 44 L47 44 M43 47 L41 47"/>
</g>
<!-- Shell outline -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="#03140a" stroke="#1f7a3a" stroke-width="2"/>
<!-- Glyph rain columns inside the shell (clip) -->
<clipPath id="mxShell"><path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"/></clipPath>
<g clip-path="url(#mxShell)" stroke-width="2" stroke-linecap="round">
  <g stroke="#1f7a3a" opacity="0.55">
    <path d="M17 19 L17 21"/><path d="M17 23 L17 25"/><path d="M17 27 L17 29"/><path d="M17 31 L17 33"/>
    <path d="M24 17 L24 19"/><path d="M24 21 L24 23"/><path d="M24 25 L24 27"/><path d="M24 29 L24 31"/><path d="M24 33 L24 35"/>
    <path d="M40 17 L40 19"/><path d="M40 21 L40 23"/><path d="M40 25 L40 27"/><path d="M40 29 L40 31"/>
    <path d="M47 19 L47 21"/><path d="M47 23 L47 25"/><path d="M47 27 L47 29"/>
    <path d="M32 16 L32 18"/><path d="M32 20 L32 22"/>
  </g>
  <!-- bright leading marks -->
  <g stroke="#9dffb8"><path d="M17 35 L17 38"/><path d="M24 37 L24 40"/><path d="M40 33 L40 36"/><path d="M47 31 L47 34"/><path d="M32 24 L32 27"/></g>
</g>
<!-- Eyes: bright glyph cells -->
<rect x="19.5" y="6.5" width="6" height="6" rx="0.6" fill="#03140a" stroke="#33ff66" stroke-width="1.4"/>
<rect x="38.5" y="6.5" width="6" height="6" rx="0.6" fill="#03140a" stroke="#33ff66" stroke-width="1.4"/>
<path d="M21 9.5 L24 9.5 M22.5 8 L22.5 11" stroke="#9dffb8" stroke-width="1.4"/>
<path d="M40 9.5 L43 9.5 M41.5 8 L41.5 11" stroke="#9dffb8" stroke-width="1.4"/>
<!-- Smile -->
<path d="M28 31 Q32 35 36 31" fill="none" stroke="#33ff66" stroke-width="1.8" stroke-linecap="round"/>
<!-- Claws -->
<ellipse cx="14" cy="21" rx="5" ry="4.2" fill="#03140a" stroke="#33ff66" stroke-width="1.8" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="5.4" ry="4.4" fill="#03140a" stroke="#33ff66" stroke-width="1.8" transform="rotate(-35 54 22)"/>
<!-- Code-stream slate -->
<g transform="rotate(-10 8 31)">
  <rect x="2" y="21" width="12" height="16" rx="1" fill="#03140a" stroke="#1f7a3a" stroke-width="1.8"/>
  <g stroke="#33ff66" stroke-width="1.2" stroke-linecap="round" opacity="0.85"><path d="M4 25 L7 25 M9 25 L12 25 M4 28.5 L6 28.5 M8 28.5 L12 28.5 M4 32 L7 32 M9 32 L11 32"/></g>
