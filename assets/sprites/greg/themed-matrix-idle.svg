<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Matrix Greg, idle: the crab pours out of the digital rain. Dense glyph columns fill the shell, leading marks burning bright. -->
<!-- Rain trails for legs / arms / stalks: stacked-glyph dashed lines -->
<g fill="none" stroke="#1f8a42" stroke-width="2" stroke-linecap="round" stroke-dasharray="1.6 2.2">
  <path d="M19 40 L13 48 L11 53"/><path d="M24 42 L20 50 L19 55"/><path d="M45 40 L51 48 L53 53"/><path d="M40 42 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/><path d="M47 32 L52 26"/><path d="M25 18 L23 11"/><path d="M39 18 L41 11"/>
</g>
<g fill="#7dff9e"><circle cx="11" cy="53" r="1.1"/><circle cx="19" cy="55" r="1.1"/><circle cx="53" cy="53" r="1.1"/><circle cx="45" cy="55" r="1.1"/></g>
<!-- Dark shell, faint code-green edge -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="#04140a" stroke="#1f8a42" stroke-width="1.8"/>
<clipPath id="mxShell"><path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"/></clipPath>
<g clip-path="url(#mxShell)">
  <!-- glyph rain columns: dim above, bright below, dashed = stacked characters -->
  <g fill="none" stroke-linecap="butt" stroke-dasharray="1.8 1.8">
    <path d="M15 16 L15 30" stroke="#1f7a3a" stroke-width="2"/><path d="M15 30 L15 40" stroke="#4ee07a" stroke-width="2"/>
    <path d="M21 14 L21 26" stroke="#1f7a3a" stroke-width="2"/><path d="M21 26 L21 43" stroke="#4ee07a" stroke-width="2"/>
    <path d="M27 18 L27 32" stroke="#1f7a3a" stroke-width="2"/><path d="M27 32 L27 41" stroke="#4ee07a" stroke-width="2"/>
    <path d="M37 14 L37 28" stroke="#1f7a3a" stroke-width="2"/><path d="M37 28 L37 43" stroke="#4ee07a" stroke-width="2"/>
    <path d="M43 16 L43 30" stroke="#1f7a3a" stroke-width="2"/><path d="M43 30 L43 40" stroke="#4ee07a" stroke-width="2"/>
    <path d="M49 18 L49 28" stroke="#1f7a3a" stroke-width="2"/><path d="M49 28 L49 38" stroke="#4ee07a" stroke-width="2"/>
  </g>
  <!-- burning leading marks at the column heads -->
  <g fill="#c9ffd6"><rect x="14" y="39" width="2" height="2"/><rect x="20" y="42" width="2" height="2"/><rect x="26" y="40" width="2" height="2"/><rect x="36" y="42" width="2" height="2"/><rect x="42" y="39" width="2" height="2"/><rect x="48" y="37" width="2" height="2"/></g>
  <!-- a few distinct katakana-ish glyphs -->
  <g fill="none" stroke="#7dff9e" stroke-width="1.1" stroke-linecap="round">
    <path d="M30 21 L34 21 M32 21 L31 25 M32 23 L34 24"/>
    <path d="M40 35 L44 35 M42 33 L42 37"/>
  </g>
</g>
<!-- Eyes: bright glyph cells -->
<rect x="19.5" y="6" width="6" height="6" rx="0.6" fill="#04140a" stroke="#33ff66" stroke-width="1.4"/>
<rect x="38.5" y="6" width="6" height="6" rx="0.6" fill="#04140a" stroke="#33ff66" stroke-width="1.4"/>
<path d="M21 9 L24 9 M22.5 7.5 L22.5 10.5" stroke="#c9ffd6" stroke-width="1.4"/>
<path d="M40 9 L43 9 M41.5 7.5 L41.5 10.5" stroke="#c9ffd6" stroke-width="1.4"/>
<!-- Smile from glyph dots -->
<g fill="#33ff66"><circle cx="28" cy="33" r="0.9"/><circle cx="30.5" cy="34.6" r="0.9"/><circle cx="33.5" cy="34.6" r="0.9"/><circle cx="36" cy="33" r="0.9"/></g>
<!-- Claws -->
<ellipse cx="14" cy="21" rx="5" ry="4.2" fill="#04140a" stroke="#33ff66" stroke-width="1.6" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="5.4" ry="4.4" fill="#04140a" stroke="#33ff66" stroke-width="1.6" transform="rotate(-35 54 22)"/>
</svg>
