<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2.3 0.52 66.3 66.3">
<!-- Origami Greg, idle: a folded-paper crab, faceted shell of flat planes with crease lines, sharp paper claws, a folded bookmark tag. -->
<!-- Folded strip legs (eye-stalks included here, OUTSIDE the blink group) -->
<g fill="none" stroke="#b5654a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<!-- Eyes (open): folded-paper diamonds + pupils -->
<g class="greg-eyes-open">
  <path d="M19.5 9.5 L22.5 6.5 L25.5 9.5 L22.5 12.5 Z" fill="#fbf3e6" stroke="#b5654a" stroke-width="1.6"/>
  <path d="M38.5 9.5 L41.5 6.5 L44.5 9.5 L41.5 12.5 Z" fill="#fbf3e6" stroke="#b5654a" stroke-width="1.6"/>
  <circle cx="22.5" cy="9.7" r="1.5" fill="#5c3826"/>
  <circle cx="41.5" cy="9.7" r="1.5" fill="#5c3826"/>
</g>
<!-- Eyes (closed): a folded crease, shown only mid-blink -->
<g class="greg-eyes-closed" style="display:none" fill="none" stroke="#b5654a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19.5 9.3 L22.5 11.6 L25.5 9.3"/>
  <path d="M38.5 9.3 L41.5 11.6 L44.5 9.3"/>
</g>
<!-- Sharp paper claws -->
<path d="M9 24 L17 19 L15 25 L18 23 Z" fill="#e8a07e" stroke="#b5654a" stroke-width="1.6" stroke-linejoin="round"/>
<path d="M55 25 L47 20 L49 26 L46 24 Z" fill="#e8a07e" stroke="#b5654a" stroke-width="1.6" stroke-linejoin="round"/>
<!-- Faceted shell: flat folded planes -->
<path d="M10 31 L32 14 L54 31 L32 44 Z" fill="#f0a878" stroke="#b5654a" stroke-width="2.2" stroke-linejoin="round"/>
<path d="M10 31 L32 14 L32 28 Z" fill="#e89060"/>
<path d="M54 31 L32 14 L32 28 Z" fill="#f6bd94"/>
<path d="M10 31 L32 28 L32 44 Z" fill="#d97f54"/>
<path d="M54 31 L32 28 L32 44 Z" fill="#e89060"/>
<!-- Crease lines redrawn over facets -->
<g fill="none" stroke="#b5654a" stroke-width="1.4" stroke-linejoin="round">
  <path d="M10 31 L32 14 L54 31 L32 44 Z"/>
  <path d="M32 14 L32 44 M10 31 L54 31"/>
</g>
<!-- Smile (open): a creased fold -->
<path class="greg-smile-open" d="M27.5 34 L32 38 L36.5 34" fill="none" stroke="#8a4a38" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Smile (closed): a flatter content fold -->
<path class="greg-smile-closed" style="display:none" d="M28.5 35 L32 36.6 L35.5 35" fill="none" stroke="#8a4a38" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Folded bookmark tag in left claw -->
<g transform="rotate(-10 9 35)">
  <path d="M3 27 L15 27 L15 41 L9 38 L3 41 Z" fill="#7ec8c0" stroke="#3a857d" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M5.5 31 L12.5 31 M5.5 34 L12.5 34" stroke="#3a857d" stroke-width="1" opacity="0.7"/>
</g>
</svg>
