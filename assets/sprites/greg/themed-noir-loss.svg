<g clip-path="url(#noirShellL)">
  <path d="M36 37 L56 51 L56 37 Z" fill="#34343c"/>
  <g stroke="#26262e" stroke-width="2.2" opacity="0.6"><path d="M8 41 L56 41"/><path d="M8 46 L56 46"/></g>
</g>
<ellipse cx="32" cy="37" rx="20" ry="3.6" fill="#6a6a74" stroke="#ececed" stroke-width="2"/>
<!-- Flopped stalks + X eyes -->
<g fill="none" stroke="#ececed" stroke-width="2.2" stroke-linecap="round">
  <path d="M17 37 L11.5 30"/>
  <path d="M22.5 36 L21 27.5"/>
</g>
<circle cx="10.5" cy="26.5" r="4.2" fill="#ececed"/>
<path d="M8.7 24.7 L12.3 28.3 M12.3 24.7 L8.7 28.3" stroke="#1a1a1f" stroke-width="1.7" stroke-linecap="round"/>
