<path d="M18.7 22.2 L22.3 25.8 M22.3 22.2 L18.7 25.8" stroke="#1a1a1f" stroke-width="1.7" stroke-linecap="round"/>
<!-- Dropped magnifier -->
<g transform="rotate(14 50 57)">
  <circle cx="48" cy="55" r="5" fill="#1a1a1f" stroke="#ececed" stroke-width="2.2"/>
  <path d="M51.5 58.5 L56 62" stroke="#ececed" stroke-width="2.4" stroke-linecap="round"/>
