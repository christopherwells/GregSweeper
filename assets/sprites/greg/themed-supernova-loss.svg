<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Supernova Greg, loss: the remnant. A Crab Nebula of tangled filaments, warm gas webbing a cold blue heart. -->
<defs>
  <radialGradient id="snHeart" cx="0.5" cy="0.48" r="0.55">
    <stop offset="0" stop-color="#eafcff"/>
    <stop offset="0.35" stop-color="#69d6ff"/>
    <stop offset="0.7" stop-color="#2f6fb8" stop-opacity="0.75"/>
    <stop offset="1" stop-color="#2a2f6a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="snVeil" cx="0.5" cy="0.5" r="0.55">
    <stop offset="0.3" stop-color="#b85ad0" stop-opacity="0"/>
    <stop offset="0.85" stop-color="#a23fb8" stop-opacity="0.35"/>
    <stop offset="1" stop-color="#7a2a9a" stop-opacity="0"/>
  </radialGradient>
</defs>
<!-- magenta outer veil -->
<ellipse cx="32" cy="32" rx="29" ry="24" fill="url(#snVeil)"/>
<!-- cold blue synchrotron heart -->
<ellipse cx="32" cy="32" rx="23" ry="19" fill="url(#snHeart)"/>
<!-- tangled warm filament web (outer reds, inner oranges, pink threads) -->
<g fill="none" stroke-linecap="round">
  <g stroke="#e0463a" stroke-width="1.1" opacity="0.92">
    <path d="M8 30 C14 22 21 22 25 28 C28 32 27 38 22 41 C16 44 11 40 10 34"/>
    <path d="M56 30 C50 21 43 22 39 28 C36 33 38 40 44 42"/>
    <path d="M14 44 C20 40 25 42 28 46 C30 49 28 52 24 52"/>
    <path d="M50 44 C44 41 39 43 36 47"/>
    <path d="M18 16 C24 19 29 25 31 31"/>
    <path d="M47 17 C41 20 36 26 34 32"/>
    <path d="M30 10 C32 16 33 22 32 28"/>
  </g>
  <g stroke="#ff9a4a" stroke-width="0.8" opacity="0.9">
    <path d="M11 31 C17 25 23 26 26 31"/>
    <path d="M53 31 C47 25 41 26 38 31"/>
    <path d="M22 45 C26 41 30 43 33 47"/>
    <path d="M22 19 C27 23 30 28 31 33"/>
    <path d="M44 20 C39 24 35 29 33 34"/>
    <path d="M16 38 C22 34 27 36 31 40"/>
    <path d="M48 38 C42 35 37 36 34 40"/>
  </g>
  <g stroke="#ffc6e0" stroke-width="0.7" opacity="0.8">
    <path d="M20 28 C25 25 29 27 31 31"/>
    <path d="M44 28 C39 25 35 27 33 31"/>
    <path d="M26 42 C29 39 33 40 35 43"/>
  </g>
  <g stroke="#7fe6ff" stroke-width="0.7" opacity="0.75">
    <path d="M27 30 Q32 32 37 30"/><path d="M29 35 Q32 33 35 35"/><path d="M30 26 Q32 27 34 26"/>
  </g>
</g>
<!-- bright knots in the filaments -->
<g fill="#fff0d0"><circle cx="22" cy="41" r="1"/><circle cx="44" cy="42" r="0.9"/><circle cx="18" cy="22" r="0.8"/><circle cx="46" cy="22" r="0.8"/></g>
<!-- pulsar at the heart, faint diffraction -->
<circle cx="32" cy="32" r="1.6" fill="#ffffff"/>
<g stroke="#dff4ff" stroke-width="0.7" stroke-linecap="round" opacity="0.7"><path d="M32 27 L32 37 M27 32 L37 32"/></g>
<!-- field stars of varied size -->
<g fill="#eaf6ff"><circle cx="9" cy="13" r="1.1"/><circle cx="55" cy="12" r="1"/><circle cx="58" cy="48" r="1.1"/><circle cx="7" cy="49" r="0.9"/><circle cx="48" cy="8" r="0.8"/><circle cx="20" cy="56" r="0.8"/><circle cx="40" cy="55" r="0.7"/><circle cx="3" cy="34" r="0.7"/><circle cx="61" cy="34" r="0.7"/></g>
</svg>
