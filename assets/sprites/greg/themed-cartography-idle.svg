<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6.11 -3.14 74.22 74.22">
<!-- Cartography Greg: a beast drawn on the chart, sepia pen, riding
     the charted swell. Here be Greg. -->
<!-- The charted sea -->
<path d="M4 52 C10 49 16 55 22 52 C28 49 34 55 40 52 C46 49 52 55 60 52"
      stroke="#6a4a26" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<!-- Legs, sepia pen -->
<g fill="none" stroke="#5c4020" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 46 L11 50"/>
  <path d="M24 43.5 L20 48.5 L19 52"/>
  <path d="M45 41 L51 46 L53 50"/>
  <path d="M40 43.5 L44 48.5 L45 52"/>
</g>
<!-- Arms -->
<g fill="none" stroke="#5c4020" stroke-width="3.2" stroke-linecap="round">
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
</g>
<!-- Eye stalks + cream-dot eyes -->
<g fill="none" stroke="#5c4020" stroke-width="2.8" stroke-linecap="round">
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<circle cx="22.5" cy="9.5" r="4.2" fill="#5c4020"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="#5c4020"/>
<circle cx="23.3" cy="9" r="1.4" fill="#ebdcb8"/>
<circle cx="40.7" cy="9" r="1.4" fill="#ebdcb8"/>
<!-- Shell: sepia line-work with a hatched waterline shadow -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="none" stroke="#5c4020" stroke-width="2.8"/>
<path d="M16 36 L20 32 M21 38.5 L25 34.5 M38 39 L42 35 M43 37 L47 33"
      stroke="#5c4020" stroke-width="1.3" opacity="0.6"/>
<!-- Smile -->
<path d="M27.5 31.5 Q32 37 36.5 31.5" fill="none" stroke="#5c4020" stroke-width="2.4" stroke-linecap="round"/>
<!-- Pincers with the red-ink tips -->
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="none" stroke="#5c4020" stroke-width="2.6" transform="rotate(-35 54 22)"/>
<path d="M57.5 17 L60.5 13.5" stroke="#8a3020" stroke-width="2.4" stroke-linecap="round"/>
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="none" stroke="#5c4020" stroke-width="2.6" transform="rotate(28 14 21)"/>
<path d="M10.5 16.5 L7.5 13" stroke="#8a3020" stroke-width="2.4" stroke-linecap="round"/>
<!-- The chart he carries: an X marks the spot -->
<g transform="rotate(-12 8 30)">
  <rect x="0" y="19" width="16" height="22" rx="1" fill="#ebdcb8" stroke="#5c4020" stroke-width="2.2"/>
  <path d="M3 30 C6 27 10 31 13 28" stroke="#6a4a26" stroke-width="1.2" fill="none" opacity="0.8"/>
  <path d="M9 34 L12.5 37.5 M12.5 34 L9 37.5" stroke="#8a3020" stroke-width="1.7" stroke-linecap="round"/>
  <circle cx="5" cy="24" r="1" fill="#6a4a26" opacity="0.8"/>
</g>
</svg>
