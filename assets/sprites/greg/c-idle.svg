<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Greg direction C, "Face Greg": the shell IS the face, built to
       read in the tiny reset button the smiley lives in. Stalk nubs and
       side claws keep him a crab; a small clipboard keeps him on duty. -->
  <!-- Tiny legs peeking under the shell -->
  <g fill="none" stroke-linecap="round">
    <g stroke="#232838" stroke-width="8">
      <path d="M36 102 L30 114"/>
      <path d="M48 106 L45 118"/>
      <path d="M92 102 L98 114"/>
      <path d="M80 106 L83 118"/>
    </g>
    <g stroke="#53a05b" stroke-width="3.8">
      <path d="M36 102 L30 114"/>
      <path d="M48 106 L45 118"/>
      <path d="M92 102 L98 114"/>
      <path d="M80 106 L83 118"/>
    </g>
  </g>
  <!-- Claw arms -->
  <g fill="none" stroke-linecap="round">
    <path d="M22 88 L14 96" stroke="#232838" stroke-width="10"/>
    <path d="M106 88 L112 96" stroke="#232838" stroke-width="10"/>
    <path d="M22 88 L14 96" stroke="#53a05b" stroke-width="5"/>
    <path d="M106 88 L112 96" stroke="#53a05b" stroke-width="5"/>
  </g>
  <!-- Stalk nubs on top -->
  <ellipse cx="46" cy="24" rx="7" ry="8" fill="#53a05b" stroke="#232838" stroke-width="5"/>
  <ellipse cx="82" cy="24" rx="7" ry="8" fill="#53a05b" stroke="#232838" stroke-width="5"/>
  <!-- Shell face -->
  <path d="M14 68 C14 40 36 25 64 25 C92 25 114 40 114 68 C114 92 94 106 64 106 C34 106 14 92 14 68 Z"
        fill="#53a05b" stroke="#232838" stroke-width="6"/>
  <path d="M22 80 C34 96 94 96 106 80 C98 98 82 104 64 104 C46 104 30 98 22 80 Z" fill="#3e7f46"/>
  <!-- Mottling -->
  <g fill="#7cc184">
    <circle cx="32" cy="48" r="3.6"/>
    <circle cx="46" cy="38" r="2.8"/>
    <circle cx="96" cy="48" r="3.2"/>
    <circle cx="84" cy="38" r="2.4"/>
  </g>
  <!-- Eyes -->
  <circle cx="46" cy="58" r="12" fill="#ffffff" stroke="#232838" stroke-width="5"/>
  <circle cx="82" cy="58" r="12" fill="#ffffff" stroke="#232838" stroke-width="5"/>
  <circle cx="48" cy="60" r="4.6" fill="#232838"/>
  <circle cx="80" cy="60" r="4.6" fill="#232838"/>
  <circle cx="50" cy="58" r="1.6" fill="#ffffff"/>
  <circle cx="82" cy="58" r="1.6" fill="#ffffff"/>
  <!-- Smile -->
  <path d="M48 78 Q64 90 80 78" fill="none" stroke="#232838" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left pincer hand -->
  <ellipse cx="12" cy="100" rx="8.5" ry="6.5" fill="#53a05b" stroke="#232838" stroke-width="5" transform="rotate(-35 12 100)"/>
  <ellipse cx="8" cy="94" rx="4" ry="3.2" fill="#e8873a" stroke="#232838" stroke-width="3.5" transform="rotate(-35 8 94)"/>
  <!-- Small clipboard held out at the right side, low and tilted -->
  <g transform="rotate(18 114 104)">
    <rect x="102" y="88" width="21" height="27" rx="3" fill="#f3f6fb" stroke="#232838" stroke-width="4"/>
    <rect x="108" y="84" width="9" height="7" rx="2" fill="#b9c2d4" stroke="#232838" stroke-width="3"/>
    <g fill="#d4dae6">
      <rect x="106" y="95" width="5" height="5" rx="1"/>
      <rect x="113" y="95" width="5" height="5" rx="1"/>
      <rect x="106" y="102" width="5" height="5" rx="1"/>
    </g>
    <rect x="113" y="102" width="5" height="5" rx="1" fill="#ffd23e"/>
  </g>
  <!-- Right pincer gripping the clipboard's near edge -->
  <ellipse cx="106" cy="99" rx="8" ry="6" fill="#53a05b" stroke="#232838" stroke-width="5" transform="rotate(35 106 99)"/>
  <ellipse cx="110" cy="93" rx="3.8" ry="3" fill="#e8873a" stroke="#232838" stroke-width="3.5" transform="rotate(35 110 93)"/>
</svg>
