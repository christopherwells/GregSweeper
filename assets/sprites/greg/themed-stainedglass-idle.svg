<svg xmlns="http://www.w3.org/2000/svg" viewBox="-3.19 -2.78 68.86 68.86">
<!-- Stainedglass Greg, idle: a leaded-glass crab, jewel-tone panes set in black came, glass glints. -->
<!-- Lead legs / arms / stalks (dark came with a colored glass core) -->
<g fill="none" stroke="#16161c" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/><path d="M24 43.5 L20 50 L19 55"/><path d="M45 41 L51 47 L53 52"/><path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/><path d="M47 32 L52 26"/><path d="M25 18.5 L23 12.5"/><path d="M39 18.5 L41 12.5"/>
</g>
<g fill="none" stroke="#5aa0c8" stroke-width="1.3" stroke-linecap="round">
  <path d="M19 41 L13 47 L11 52"/><path d="M24 43.5 L20 50 L19 55"/><path d="M45 41 L51 47 L53 52"/><path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/><path d="M47 32 L52 26"/><path d="M25 18.5 L23 12.5"/><path d="M39 18.5 L41 12.5"/>
</g>
<!-- Glass claws -->
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="#d94f7a" stroke="#16161c" stroke-width="2.4" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="#3a8a52" stroke="#16161c" stroke-width="2.4" transform="rotate(-35 54 22)"/>
<!-- Pane fills, clipped to the shell -->
<clipPath id="sgShell"><path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"/></clipPath>
<g clip-path="url(#sgShell)">
  <path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 L32 19 L22 29 Z" fill="#3a6ea5"/>
  <path d="M32 15 Q37 15 42 17.5 C48 19 53 24 53 31 L42 29 L32 19 Z" fill="#e0a83a"/>
  <path d="M22 29 L32 39 L32 43 C19 43 11 38 11 31 Z" fill="#3a8a52"/>
  <path d="M42 29 L53 31 C53 38 45 43 32 43 L32 39 Z" fill="#7a4fa5"/>
  <path d="M32 19 L42 29 L32 39 L22 29 Z" fill="#d94f7a"/>
  <!-- shine glints -->
  <path d="M16 26 L23 19" stroke="#ffffff" stroke-width="2" opacity="0.55" stroke-linecap="round"/>
  <path d="M45 22 L49 26" stroke="#ffffff" stroke-width="1.6" opacity="0.5" stroke-linecap="round"/>
  <path d="M28 31 L31 28" stroke="#ffffff" stroke-width="1.4" opacity="0.5" stroke-linecap="round"/>
</g>
<!-- Lead came: pane seams + shell outline -->
<g fill="none" stroke="#16161c" stroke-width="2.4" stroke-linejoin="round">
  <path d="M32 19 L42 29 L32 39 L22 29 Z"/>
  <path d="M32 19 L32 15 M42 29 L53 31 M32 39 L32 43 M22 29 L11 31"/>
  <path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"/>
</g>
<!-- Eyes -->
<circle cx="22.5" cy="9.5" r="4.2" fill="#eaf2f8" stroke="#16161c" stroke-width="2.2"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="#eaf2f8" stroke="#16161c" stroke-width="2.2"/>
<circle cx="23.2" cy="10.2" r="1.6" fill="#16161c"/>
<circle cx="40.8" cy="10.2" r="1.6" fill="#16161c"/>
<!-- Smile in came -->
<path d="M27.5 33 Q32 37 36.5 33" fill="none" stroke="#16161c" stroke-width="2" stroke-linecap="round"/>
<!-- Glass-pane prop -->
<g transform="rotate(-8 8.5 31)">
