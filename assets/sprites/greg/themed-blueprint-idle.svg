<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Blueprint Greg, v2: a clean solid white line drawing on the
     cyanotype, dashes reserved for hidden edges (there are none). -->
<!-- Legs -->
<g fill="none" stroke="#dceeff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
</g>
<!-- Arms -->
<g fill="none" stroke="#dceeff" stroke-width="2.2" stroke-linecap="round">
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
</g>
<!-- Eye stalks + eyes -->
<g fill="none" stroke="#dceeff" stroke-width="2.2" stroke-linecap="round">
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<circle cx="22.5" cy="9.5" r="4.2" fill="none" stroke="#dceeff" stroke-width="2.2"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="none" stroke="#dceeff" stroke-width="2.2"/>
<circle cx="23.2" cy="10.2" r="1.5" fill="#dceeff"/>
<circle cx="40.8" cy="10.2" r="1.5" fill="#dceeff"/>
<!-- Shell, solid contour -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="none" stroke="#dceeff" stroke-width="2.4"/>
<!-- Open smile -->
<path d="M27.5 31.5 Q32 37 36.5 31.5 Z" fill="none" stroke="#dceeff" stroke-width="2" stroke-linejoin="round"/>
<!-- Pincers, solid -->
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="none" stroke="#dceeff" stroke-width="2.2" transform="rotate(-35 54 22)"/>
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="none" stroke="#dceeff" stroke-width="2.2" transform="rotate(28 14 21)"/>
<!-- Pencil -->
<path d="M50 17 L58 8 M56.5 6.5 L59.5 9.5" stroke="#dceeff" stroke-width="2" stroke-linecap="round"/>
<!-- Clipboard -->
<g transform="rotate(-12 8 30)">
  <rect x="0" y="19" width="16" height="22" rx="1.5" fill="none" stroke="#dceeff" stroke-width="2"/>
  <path d="M4.5 16.5 L11.5 16.5" stroke="#dceeff" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M3 25 L13 25 M3 30 L13 30 M3 35 L13 35" stroke="#dceeff" stroke-width="1" opacity="0.7"/>
</g>
</svg>
