<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Circuit Greg, loss: fried. Flipped board, a scorched crater sparking, a popped capacitor, red X LED eyes. -->
<!-- Copper trace legs up -->
<g fill="none" stroke="#8a5a28" stroke-width="2" stroke-linecap="square">
  <path d="M21 35 L21 30 L19 26 L19 23"/>
  <path d="M27.5 34 L27.5 28 L28.5 24 L28.5 21"/>
  <path d="M36.5 34 L36.5 28 L35.5 24 L35.5 21"/>
  <path d="M43 35 L43 30 L45 26 L45 23"/>
  <path d="M15 39 L9 39 L9 36"/>
  <path d="M49 39 L55 39 L55 36"/>
</g>
<g fill="#a88040" stroke="#6a4418" stroke-width="0.8"><circle cx="19" cy="23" r="1.5"/><circle cx="45" cy="23" r="1.5"/></g>
<!-- Chip claws, dull -->
<rect x="2.5" y="30" width="8" height="6.5" rx="1" fill="#163a26" stroke="#8a5a28" stroke-width="1.6" transform="rotate(-20 6.5 33)"/>
<rect x="53.5" y="30" width="8" height="6.5" rx="1" fill="#163a26" stroke="#8a5a28" stroke-width="1.6" transform="rotate(20 57.5 33)"/>
<!-- Overturned board -->
<path d="M12 38 C12 42 15 46 20 48.5 Q26 51 32 51 Q38 51 44 48.5 C49 46 52 42 52 38 L52 37 L12 37 Z"
      fill="#14502c" stroke="#0c3a20" stroke-width="2.4" stroke-linejoin="round"/>
<ellipse cx="32" cy="37" rx="20" ry="4" fill="#1a6b3a" stroke="#0c3a20" stroke-width="1.8"/>
<!-- Scorch crater, sparking -->
<circle cx="30" cy="43" r="7" fill="#2a1408" opacity="0.7"/>
<circle cx="30" cy="43" r="4.4" fill="#0a0a0a"/>
<path d="M30 43 m-4.4 0 a4.4 4.4 0 0 1 8.8 0" fill="none" stroke="#ff7a26" stroke-width="1.6"/>
<g stroke="#ffd23e" stroke-width="1.6" stroke-linecap="round"><path d="M30 36 L28 32 M34 38 L38 35 M26 40 L22 39"/></g>
<!-- Popped electrolytic capacitor, tipped over -->
<g transform="rotate(40 44 47)">
  <rect x="40" y="43" width="6" height="9" rx="1.5" fill="#2a3a8a" stroke="#13245a" stroke-width="1.2"/>
  <path d="M40 44 L46 44" stroke="#9fb6e8" stroke-width="0.9"/>
  <path d="M41.5 43 L43 40 L44.5 43" fill="none" stroke="#c0c0c0" stroke-width="1.2"/>
</g>
<!-- Flopped LED stalks + red X eyes -->
<g fill="none" stroke="#8a5a28" stroke-width="2" stroke-linecap="square">
  <path d="M17 37 L13 33 L11.5 30"/>
  <path d="M22.5 36 L21.5 31 L21 27.5"/>
</g>
<rect x="7" y="23" width="7" height="7" rx="1" fill="#3a1414" stroke="#1a0808" stroke-width="1.4"/>
<path d="M8.5 24.5 L12.5 28.5 M12.5 24.5 L8.5 28.5" stroke="#ff5a5a" stroke-width="1.5" stroke-linecap="round"/>
<rect x="17" y="20.5" width="7" height="7" rx="1" fill="#3a1414" stroke="#1a0808" stroke-width="1.4"/>
<path d="M18.5 22 L22.5 26 M22.5 22 L18.5 26" stroke="#ff5a5a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
