<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Candy Greg, idle: a glossy confection crab, peppermint-swirl shell, sprinkles, a lollipop instead of a pencil, a chocolate-bar slate. -->
<g fill="none" stroke="#7a2a44" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<circle cx="22.5" cy="9.5" r="4.2" fill="#fff5fa" stroke="#7a2a44" stroke-width="2"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="#fff5fa" stroke="#7a2a44" stroke-width="2"/>
<circle cx="23.2" cy="10.2" r="1.6" fill="#7a2a44"/>
<circle cx="40.8" cy="10.2" r="1.6" fill="#7a2a44"/>
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="#ff8fb0" stroke="#7a2a44" stroke-width="2.2" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="#ff8fb0" stroke="#7a2a44" stroke-width="2.2" transform="rotate(-35 54 22)"/>
<!-- Glossy shell -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="#ff6f91" stroke="#7a2a44" stroke-width="2.4"/>
<!-- Peppermint swirl -->
<path d="M32 29 m0 -9 a9 9 0 1 1 -0.1 0" fill="none" stroke="#fff5fa" stroke-width="3.4" opacity="0.9"/>
<path d="M32 29 m0 -5 a5 5 0 1 0 0.1 0" fill="none" stroke="#fff5fa" stroke-width="3" opacity="0.9"/>
<!-- Gloss highlight -->
<path d="M17 24 C21 20 26 18.5 30 18.5" stroke="#ffd0de" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.8"/>
<!-- Sprinkles -->
<g stroke-width="1.8" stroke-linecap="round">
  <path d="M19 36 L21 38" stroke="#5ad1e0"/><path d="M44 36 L46 34" stroke="#ffe14d"/>
  <path d="M25 40 L27 40" stroke="#7be07a"/><path d="M39 40 L41 40" stroke="#9a7fff"/>
</g>
<!-- Smile -->
<path d="M27.5 31.5 Q32 36 36.5 31.5" fill="none" stroke="#7a2a44" stroke-width="2" stroke-linecap="round"/>
<!-- Lollipop in right claw -->
<circle cx="57" cy="12" r="4.4" fill="#ff6f91" stroke="#7a2a44" stroke-width="1.8"/>
<path d="M57 12 m0 -2.6 a2.6 2.6 0 1 1 -0.1 0" fill="none" stroke="#fff5fa" stroke-width="1.4"/>
<path d="M54 15.5 L51 20" stroke="#fff5fa" stroke-width="2" stroke-linecap="round"/>
<!-- Chocolate-bar slate -->
<g transform="rotate(-10 8 31)">
  <rect x="2" y="21" width="12" height="16" rx="1.5" fill="#7a4a2e" stroke="#4a2a18" stroke-width="2"/>
  <path d="M8 21 L8 37 M2 26 L14 26 M2 31 L14 31" stroke="#4a2a18" stroke-width="1" opacity="0.7"/>
