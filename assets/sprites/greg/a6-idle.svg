<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- A drill-down, variant 6: CHUNKY MINIMAL. A1 simplified for
       maximum small-size punch: heavier outline, two legs per side,
       no mottling, simplified clipboard, no pencil. -->
  <!-- Walking legs, two per side -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#232838" stroke-width="11">
      <path d="M44 84 L32 98 L28 109"/>
      <path d="M84 84 L96 98 L100 109"/>
    </g>
    <g stroke="#53a05b" stroke-width="5.5">
      <path d="M44 84 L32 98 L28 109"/>
      <path d="M84 84 L96 98 L100 109"/>
    </g>
  </g>
  <!-- Arms -->
  <g fill="none" stroke-linecap="round">
    <path d="M40 66 L26 56" stroke="#232838" stroke-width="12"/>
    <path d="M88 66 L102 56" stroke="#232838" stroke-width="12"/>
    <path d="M40 66 L26 56" stroke="#53a05b" stroke-width="6"/>
    <path d="M88 66 L102 56" stroke="#53a05b" stroke-width="6"/>
  </g>
  <!-- Eye stalks -->
  <g fill="none" stroke-linecap="round">
    <path d="M52 40 L48 29" stroke="#232838" stroke-width="12"/>
    <path d="M76 40 L80 29" stroke="#232838" stroke-width="12"/>
    <path d="M52 40 L48 29" stroke="#53a05b" stroke-width="6"/>
    <path d="M76 40 L80 29" stroke="#53a05b" stroke-width="6"/>
  </g>
  <circle cx="47" cy="22" r="10" fill="#ffffff" stroke="#232838" stroke-width="6"/>
  <circle cx="81" cy="22" r="10" fill="#ffffff" stroke="#232838" stroke-width="6"/>
  <circle cx="48.5" cy="24" r="3.8" fill="#232838"/>
  <circle cx="79.5" cy="24" r="3.8" fill="#232838"/>
  <!-- Carapace, heavy outline -->
  <path d="M30 62 C30 41 45 31 64 31 C83 31 98 41 98 62 C98 78 84 89 64 89 C44 89 30 78 30 62 Z"
        fill="#53a05b" stroke="#232838" stroke-width="8"/>
  <path d="M36 70 C44 80 84 80 92 70 C88 82 78 87 64 87 C50 87 40 82 36 70 Z" fill="#3e7f46"/>
  <!-- Smile, thick -->
  <path d="M53 69 Q64 79 75 69" fill="none" stroke="#232838" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Right pincer, plain -->
  <ellipse cx="106" cy="50" rx="10" ry="8" fill="#53a05b" stroke="#232838" stroke-width="6" transform="rotate(-35 106 50)"/>
  <ellipse cx="112" cy="43" rx="5" ry="4" fill="#e8873a" stroke="#232838" stroke-width="4.5" transform="rotate(-35 112 43)"/>
  <!-- Simplified clipboard: three ruled lines, no grid -->
  <g transform="rotate(-8 18 62)">
    <rect x="5" y="44" width="27" height="37" rx="4" fill="#f3f6fb" stroke="#232838" stroke-width="5.5"/>
    <rect x="13" y="39" width="11" height="8" rx="2.5" fill="#b9c2d4" stroke="#232838" stroke-width="4"/>
    <g stroke="#b9c2d4" stroke-width="4" stroke-linecap="round">
      <path d="M11 55 L27 55"/>
      <path d="M11 63 L27 63"/>
      <path d="M11 71 L21 71"/>
    </g>
  </g>
  <ellipse cx="29" cy="49" rx="9" ry="7.5" fill="#53a05b" stroke="#232838" stroke-width="6" transform="rotate(28 29 49)"/>
  <ellipse cx="35" cy="43" rx="4.5" ry="3.6" fill="#e8873a" stroke="#232838" stroke-width="4.5" transform="rotate(28 35 43)"/>
</svg>
