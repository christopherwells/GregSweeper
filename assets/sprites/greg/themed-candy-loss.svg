<circle cx="10.5" cy="26.5" r="4.2" fill="#fff5fa" stroke="#7a2a44" stroke-width="2"/>
<path d="M8.7 24.7 L12.3 28.3 M12.3 24.7 L8.7 28.3" stroke="#7a2a44" stroke-width="1.5" stroke-linecap="round"/>
