<circle cx="21.5" cy="25" r="4" fill="#fff5fa" stroke="#7a2a44" stroke-width="2"/>
<path d="M19.8 23.3 L23.2 26.7 M23.2 23.3 L19.8 26.7" stroke="#7a2a44" stroke-width="1.5" stroke-linecap="round"/>
