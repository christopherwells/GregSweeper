<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Sumi-e Greg, v3: one loaded press for the body, dark and wet,
     tone running diagonally as the brush emptied; a hairline seam low
     where the bristles split. Thin jointed legs, claw daubs, eye
     flicks with ink dots, smile as a paper reserve. The hanko is his
     field stamp. -->
<defs>
  <linearGradient id="inkM" x1="0.15" y1="0" x2="0.9" y2="1">
    <stop offset="0" stop-color="#0d0d0d"/>
    <stop offset="0.55" stop-color="#2e2e2e"/>
    <stop offset="1" stop-color="#484848"/>
  </linearGradient>
  <linearGradient id="inkC" x1="0" y1="0" x2="0.8" y2="1">
    <stop offset="0" stop-color="#171717"/>
    <stop offset="1" stop-color="#4a4a4a"/>
  </linearGradient>
</defs>
<!-- Legs: dark jointed strokes -->
<g fill="none" stroke="#1c1c1c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M17 35 L11 41 L9 48"/>
  <path d="M22 38.5 L18 45 L17.5 51"/>
  <path d="M47 35 L53 41 L55 48"/>
  <path d="M42 38.5 L46 45 L46.5 51"/>
</g>
<!-- Claw daubs -->
<path d="M15 25 C10 21 6 16 7 12.5 C9.5 11 14 13.5 16.5 17.5 C18 20.5 17.5 23.5 15 25 Z" fill="url(#inkC)"/>
<path d="M5.5 13.5 L3 9.5" stroke="#1c1c1c" stroke-width="1.7" stroke-linecap="round" opacity="0.7"/>
<path d="M49 25 C54 21 58 16 57 12.5 C54.5 11 50 13.5 47.5 17.5 C46 20.5 46.5 23.5 49 25 Z" fill="url(#inkC)"/>
<path d="M58.5 13.5 L61 9.5" stroke="#1c1c1c" stroke-width="1.7" stroke-linecap="round" opacity="0.7"/>
<!-- Body: one rounded loaded press -->
<path d="M16 21 C20 16.5 27 15 32 15 C37 15 44 16.5 48 21 C50.5 25.5 50.5 32 48 36.5 C44 40.5 37 41.5 32 41.5 C27 41.5 20 40.5 16 36.5 C13.5 32 13.5 25.5 16 21 Z"
      fill="url(#inkM)"/>
<!-- Eye flicks + ink dots -->
<path d="M26 15.5 Q25 12 24 9" stroke="#141414" stroke-width="2" fill="none" stroke-linecap="round"/>
<path d="M38 15.5 Q39 12 40 9" stroke="#141414" stroke-width="2" fill="none" stroke-linecap="round"/>
<circle cx="23.5" cy="7.6" r="2.6" fill="#0d0d0d"/>
<circle cx="40.5" cy="7.6" r="2.6" fill="#0d0d0d"/>
<!-- Smile: a paper reserve -->
<path d="M27.5 31 Q32 35.5 36.5 31" fill="none" stroke="#f2ede1" stroke-width="2.4" stroke-linecap="round" opacity="0.95"/>
<!-- The hanko -->
<rect x="51" y="50" width="9" height="9" rx="1.2" fill="#b03020"/>
<path d="M53.5 52.5 L57.5 52.5 M55.5 52.5 L55.5 56.5 M53.5 56.5 L57.5 56.5" stroke="#f2ede1" stroke-width="1.1"/>
</svg>
