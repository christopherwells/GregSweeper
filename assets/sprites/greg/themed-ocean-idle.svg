<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Ocean Greg, idle: a deep-sea surveyor, brass-rimmed porthole shell, bioluminescent spots, bubbles rising, a dive slate. -->
<g fill="none" stroke="#15485a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<!-- Eyes, glowing cyan -->
<circle cx="22.5" cy="9.5" r="4.2" fill="#bfeefe" stroke="#15485a" stroke-width="2"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="#bfeefe" stroke="#15485a" stroke-width="2"/>
<circle cx="23.2" cy="10.2" r="1.6" fill="#15485a"/>
<circle cx="40.8" cy="10.2" r="1.6" fill="#15485a"/>
<!-- Claws -->
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="#2e8ba0" stroke="#15485a" stroke-width="2.4" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="#2e8ba0" stroke="#15485a" stroke-width="2.4" transform="rotate(-35 54 22)"/>
<!-- Shell -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="#2e8ba0" stroke="#15485a" stroke-width="2.6"/>
<path d="M14 35 C18 40.5 27 42.5 32 42.5 C37 42.5 46 40.5 50 35 C47 41 39 43 32 43 C25 43 17 41 14 35 Z" fill="#1f6f82"/>
<!-- Puffer-spine dimples on the shell -->
<g fill="#1f6f82"><circle cx="20" cy="26" r="1.2"/><circle cx="32" cy="22" r="1.2"/><circle cx="44" cy="26" r="1.2"/><circle cx="26" cy="31" r="1.1"/><circle cx="38" cy="31" r="1.1"/></g>
<!-- Smile -->
<path d="M28 30 Q32 34 36 30" fill="none" stroke="#15485a" stroke-width="2" stroke-linecap="round"/>
<!-- Dive slate in left claw -->
<g transform="rotate(-10 8 31)">
  <rect x="2" y="21" width="12" height="16" rx="1.5" fill="#cfe7ec" stroke="#15485a" stroke-width="2"/>
  <path d="M4.5 26 L11.5 26 M4.5 29.5 L11.5 29.5 M4.5 33 L9 33" stroke="#15485a" stroke-width="1" opacity="0.6"/>
</g>
<!-- Bubbles rising -->
<g fill="none" stroke="#bfeefe" stroke-width="1.4" opacity="0.75">
  <circle cx="56" cy="14" r="2.4"/><circle cx="59" cy="8" r="1.6"/><circle cx="53" cy="6" r="1.2"/>
</g>
</svg>
