<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Aurora Greg, loss: the lights gutter and fall. The ribbon carapace inverted and dimming, curtains sagging, X eyes. -->
<!-- glow underlay, faded -->
<g fill="none" stroke="#37e6a8" stroke-width="5.5" opacity="0.14" stroke-linecap="round">
  <path d="M12 36 C12 45 17 51 24 53 Q29 54.5 32 54.5 Q35 54.5 40 53 C47 51 52 45 52 36"/>
</g>
<!-- inverted green ribbon shell -->
<g fill="none" stroke="#37e6a8" stroke-width="2.2" stroke-linecap="round" opacity="0.9">
  <path d="M12 36 C12 45 17 51 24 53 Q29 54.5 32 54.5 Q35 54.5 40 53 C47 51 52 45 52 36"/>
  <path d="M14 36 C18 32 25 30.5 32 30.5 C39 30.5 46 32 50 36"/>
</g>
<!-- sagging blue curtains -->
<g fill="none" stroke="#6fd3ff" stroke-width="1.8" stroke-linecap="round" opacity="0.7">
  <path d="M20 33 C19 39 20 44 22 47"/>
  <path d="M44 33 C45 39 44 44 42 47"/>
  <path d="M32 31 C31 38 32 44 32 48"/>
</g>
<!-- drooped ribbon limbs to the sides -->
<g fill="none" stroke="#6fd3ff" stroke-width="2" stroke-linecap="round" opacity="0.75">
  <path d="M14 38 C11 37 9 36 7 35"/>
  <path d="M50 38 C53 37 55 36 57 35"/>
</g>
<!-- flopped stalks + faint X eyes -->
<g fill="none" stroke="#6fd3ff" stroke-width="2" stroke-linecap="round" opacity="0.75">
  <path d="M18 35 C16 33 14 30 12.5 28"/>
  <path d="M23.5 34 C23 31.5 22.5 30 22 27.5"/>
</g>
<circle cx="11" cy="26.5" r="3.4" fill="#6fd3ff" opacity="0.12"/>
<circle cx="21" cy="24" r="3.4" fill="#6fd3ff" opacity="0.12"/>
<path d="M9.3 24.8 L12.7 28.2 M12.7 24.8 L9.3 28.2" stroke="#cdefff" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
<path d="M19.3 22.3 L22.7 25.7 M22.7 22.3 L19.3 25.7" stroke="#cdefff" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
<!-- a last star, sinking -->
<circle cx="46" cy="52" r="1.1" fill="#cdefff" opacity="0.6"/>
</svg>
