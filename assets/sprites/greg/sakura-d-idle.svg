  <path d="M18 43 C14 39 17 32 21 31.5 C25 31 29 35 27.5 39 C26 43 21.5 45.5 18 43 Z"/>
  <path d="M12 25 C11 19 17 15 22 17 C26 19 26 25 23 27.5 C20 30 12 29 12 25 Z"/>
</g>
<!-- petal notches -->
<g fill="#fff0f5"><path d="M30 14.6 L32 17 L34 14.6 Z"/><path d="M51 23.4 L48.5 24.8 L51.3 26.5 Z"/><path d="M45.8 43.8 L44 41.5 L42.4 43.8 Z"/><path d="M18.2 43.8 L20 41.5 L21.6 43.8 Z"/><path d="M13 23.4 L15.5 24.8 L12.7 26.5 Z"/></g>
