<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4.1 -5.2 72.21 72.21">
<!-- Legendary Greg, idle: an illuminated heraldic crest, gold body on a red banner, filigree flourishes, a crested shield. -->
<!-- Red banner ribbon behind -->
<path d="M14 44 L50 44 L50 56 L44 52 L38 56 L32 52 L26 56 L20 52 L14 56 Z" fill="#8a1f2e" stroke="#5a141e" stroke-width="1.6" stroke-linejoin="round"/>
<!-- Filigree curls -->
<g fill="none" stroke="#d4af37" stroke-width="1.6" stroke-linecap="round">
  <path d="M7 28 C3 26 3 21 7 20 C9 19.5 10 21 9 22.5"/>
  <path d="M57 28 C61 26 61 21 57 20 C55 19.5 54 21 55 22.5"/>
</g>
<!-- Gold legs / arms / stalks -->
<g fill="none" stroke="#9a7b1e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 51"/><path d="M24 43.5 L20 50 L19 54"/><path d="M45 41 L51 47 L53 51"/><path d="M40 43.5 L44 50 L45 54"/>
  <path d="M17 32 L12 27"/><path d="M47 32 L52 26"/><path d="M25 18.5 L23 12.5"/><path d="M39 18.5 L41 12.5"/>
</g>
<!-- Gold-rimmed eyes -->
<circle cx="22.5" cy="9.5" r="4.2" fill="#fff" stroke="#d4af37" stroke-width="2"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="#fff" stroke="#d4af37" stroke-width="2"/>
<circle cx="23.2" cy="10.2" r="1.6" fill="#3a2c0e"/>
<circle cx="40.8" cy="10.2" r="1.6" fill="#3a2c0e"/>
<!-- Claws -->
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="#d4af37" stroke="#9a7b1e" stroke-width="2.2" transform="rotate(28 14 21)"/>
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="#d4af37" stroke="#9a7b1e" stroke-width="2.2" transform="rotate(-35 54 22)"/>
<!-- Gold shell -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="#d4af37" stroke="#6e5713" stroke-width="2.4"/>
<path d="M14 35 C18 40.5 27 42.5 32 42.5 C37 42.5 46 40.5 50 35 C47 41 39 43 32 43 C25 43 17 41 14 35 Z" fill="#9a7b1e"/>
<!-- Smile -->
<path d="M27.5 31.5 Q32 36 36.5 31.5" fill="none" stroke="#6e5713" stroke-width="2" stroke-linecap="round"/>
<!-- Crested shield slate -->
<g transform="rotate(-8 8 31)">
  <path d="M2 21 L14 21 L14 31 C14 36 8 39 8 39 C8 39 2 36 2 31 Z" fill="#8a1f2e" stroke="#d4af37" stroke-width="2" stroke-linejoin="round"/>
  <path d="M2.5 28 L13.5 28 M8 21 L8 38" stroke="#d4af37" stroke-width="1.4"/>
</g>
</svg>
