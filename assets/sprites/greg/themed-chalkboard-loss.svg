  <path d="M21 35 L17 28 L19 23"/>
  <path d="M27.5 34 L25.5 26 L28.5 21"/>
  <path d="M36.5 34 L38.5 26 L35.5 21"/>
  <path d="M43 35 L47 28 L45 23"/>
</g>
<!-- Limp claw arms -->
<g fill="none" stroke="#f0ebe0" stroke-width="2.2" stroke-linecap="round">
  <path d="M15 39 L9 36"/>
  <path d="M49 39 L55 36"/>
</g>
<ellipse cx="6.5" cy="33.5" rx="5.2" ry="4.2" fill="none" stroke="#f0ebe0" stroke-width="2" transform="rotate(-30 6.5 33.5)"/>
<ellipse cx="57.5" cy="33.5" rx="5.2" ry="4.2" fill="none" stroke="#f0ebe0" stroke-width="2" transform="rotate(30 57.5 33.5)"/>
