  <path d="M17 37 L11.5 30"/>
  <path d="M22.5 36 L21 27.5"/>
</g>
<circle cx="10.5" cy="26.5" r="4.2" fill="none" stroke="#f0ebe0" stroke-width="2.2"/>
<path d="M8.8 24.8 L12.2 28.2 M12.2 24.8 L8.8 28.2" stroke="#f0ebe0" stroke-width="1.6" stroke-linecap="round"/>
