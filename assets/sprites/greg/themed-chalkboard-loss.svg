  <path d="M43 57.5 L54 57.5" stroke="#f0ebe0" stroke-width="1.1" opacity="0.7"/>
</g>
<!-- Chalk sweat drop -->
<path d="M52 17 C52 14.5 54 12 54 12 C54 12 56 14.5 56 17 A2 2.2 0 1 1 52 17 Z" fill="none" stroke="#f0ebe0" stroke-width="1.6"/>
</svg>
