<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Greg direction A, loss: flipped on his back. Shell dome down,
       pale underside up, legs waving, spiral eyes on drooped stalks,
       clipboard dropped. Tonally "oof", not horror. -->
  <!-- Legs waving up from the underside -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#232838" stroke-width="9">
      <path d="M44 70 L36 56 L40 46"/>
      <path d="M56 68 L52 52 L58 42"/>
      <path d="M74 68 L78 52 L72 42"/>
      <path d="M86 70 L94 56 L90 46"/>
    </g>
    <g stroke="#53a05b" stroke-width="4.5">
      <path d="M44 70 L36 56 L40 46"/>
      <path d="M56 68 L52 52 L58 42"/>
      <path d="M74 68 L78 52 L72 42"/>
      <path d="M86 70 L94 56 L90 46"/>
    </g>
  </g>
  <!-- Limp claw arms out the sides -->
  <g fill="none" stroke-linecap="round">
    <path d="M32 80 L19 74" stroke="#232838" stroke-width="10"/>
    <path d="M96 80 L109 74" stroke="#232838" stroke-width="10"/>
    <path d="M32 80 L19 74" stroke="#53a05b" stroke-width="5"/>
    <path d="M96 80 L109 74" stroke="#53a05b" stroke-width="5"/>
  </g>
  <ellipse cx="15" cy="70" rx="8.5" ry="6.5" fill="#53a05b" stroke="#232838" stroke-width="5" transform="rotate(-30 15 70)"/>
  <ellipse cx="11" cy="64" rx="4" ry="3.2" fill="#e8873a" stroke="#232838" stroke-width="4" transform="rotate(-30 11 64)"/>
  <ellipse cx="113" cy="70" rx="8.5" ry="6.5" fill="#53a05b" stroke="#232838" stroke-width="5" transform="rotate(30 113 70)"/>
  <ellipse cx="117" cy="64" rx="4" ry="3.2" fill="#e8873a" stroke="#232838" stroke-width="4" transform="rotate(30 117 64)"/>
  <!-- Shell, dome down -->
  <path d="M28 78 C28 98 44 110 64 110 C84 110 100 98 100 78 L100 76 L28 76 Z"
        fill="#53a05b" stroke="#232838" stroke-width="6" stroke-linejoin="round"/>
  <path d="M34 90 C44 104 84 104 94 90 C88 104 76 108 64 108 C52 108 40 104 34 90 Z" fill="#3e7f46"/>
  <!-- Pale underside facing up -->
  <ellipse cx="64" cy="76" rx="36" ry="8" fill="#dce8b4" stroke="#232838" stroke-width="5"/>
  <path d="M44 76 Q64 82 84 76" fill="none" stroke="#b5c48c" stroke-width="3" stroke-linecap="round"/>
  <!-- Dazed eyes on drooped stalks, poking up past the left rim -->
  <g fill="none" stroke-linecap="round">
    <path d="M36 74 L26 62" stroke="#232838" stroke-width="9"/>
    <path d="M46 72 L44 58" stroke="#232838" stroke-width="9"/>
    <path d="M36 74 L26 62" stroke="#53a05b" stroke-width="4.5"/>
    <path d="M46 72 L44 58" stroke="#53a05b" stroke-width="4.5"/>
  </g>
  <circle cx="24" cy="55" r="8.5" fill="#ffffff" stroke="#232838" stroke-width="5"/>
  <path d="M24 55 m 4.2 0 a 4.2 4.2 0 1 1 -4.2 -4.2 a 2.7 2.7 0 1 1 -2.7 2.7" fill="none" stroke="#232838" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="44" cy="51" r="8.5" fill="#ffffff" stroke="#232838" stroke-width="5"/>
  <path d="M44 51 m 4.2 0 a 4.2 4.2 0 1 1 -4.2 -4.2 a 2.7 2.7 0 1 1 -2.7 2.7" fill="none" stroke="#232838" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Dropped clipboard, lying flat -->
  <g transform="rotate(14 96 112)">
    <rect x="82" y="106" width="30" height="16" rx="3" fill="#f3f6fb" stroke="#232838" stroke-width="4"/>
    <g fill="#d4dae6">
      <rect x="88" y="111" width="5" height="5" rx="1"/>
      <rect x="95" y="111" width="5" height="5" rx="1"/>
      <rect x="102" y="111" width="5" height="5" rx="1"/>
    </g>
  </g>
  <!-- Dizzy wobble + sweat drop -->
  <path d="M52 26 Q60 20 68 26 Q76 32 84 26" fill="none" stroke="#9fb0d8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M100 38 C100 33 104 28 104 28 C104 28 108 33 108 38 A4 4.4 0 1 1 100 38 Z" fill="#4a78c8" stroke="#232838" stroke-width="3"/>
</svg>
