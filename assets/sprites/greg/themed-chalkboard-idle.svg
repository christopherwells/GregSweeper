<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Greg drawn in chalk: doubled wobbly outline, hatch shading on the
     shell, yellow chalk pencil. Renders on the slate board. -->
<!-- Legs -->
<g fill="none" stroke="#f0ebe0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
</g>
<!-- Arms -->
<g fill="none" stroke="#f0ebe0" stroke-width="2.2" stroke-linecap="round">
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
</g>
<!-- Eye stalks -->
<g fill="none" stroke="#f0ebe0" stroke-width="2.2" stroke-linecap="round">
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<circle cx="22.5" cy="9.5" r="4.4" fill="none" stroke="#f0ebe0" stroke-width="2.2"/>
<circle cx="41.5" cy="9.5" r="4.4" fill="none" stroke="#f0ebe0" stroke-width="2.2"/>
<circle cx="23.2" cy="10.2" r="1.6" fill="#f0ebe0"/>
<circle cx="40.8" cy="10.2" r="1.6" fill="#f0ebe0"/>
<!-- Shell: doubled chalk outline + hatch shading -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="none" stroke="#f0ebe0" stroke-width="2.4" opacity="0.95"/>
<path d="M11.8 30.6 C11.8 24 16.6 19.6 22.3 18.1 Q27.2 15.6 32 15.6 Q36.8 15.6 41.7 18.1 C47.4 19.6 52.2 24 52.2 30.6"
      fill="none" stroke="#f0ebe0" stroke-width="1" opacity="0.5"/>
<path d="M16 38 L22 32 M21 40 L26 35 M28 41.5 L31.5 38 M34.5 41.5 L38 38 M40 40 L44 36 M44.5 37.5 L48 34"
      stroke="#f0ebe0" stroke-width="1.2" opacity="0.45"/>
<!-- Open smile, chalked solid -->
<path d="M27.5 31.5 Q32 37.5 36.5 31.5 Z" fill="#f0ebe0" opacity="0.9"/>
<!-- Big right pincer + yellow chalk stick -->
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="none" stroke="#f0ebe0" stroke-width="2.2" transform="rotate(-35 54 22)"/>
<path d="M50 17 L58 8" stroke="#ffe066" stroke-width="2.8" stroke-linecap="round"/>
<!-- Clipboard: chalk rect + tally grid -->
<g transform="rotate(-12 8 30)">
  <rect x="0" y="19" width="16" height="22" rx="2" fill="none" stroke="#f0ebe0" stroke-width="2.2"/>
  <path d="M4.5 16.5 L11.5 16.5" stroke="#f0ebe0" stroke-width="2" stroke-linecap="round"/>
  <path d="M3 25 L13 25 M3 30 L13 30 M3 35 L9 35" stroke="#f0ebe0" stroke-width="1.3" opacity="0.7"/>
  <path d="M10.5 33 L13 37 M13 33 L10.5 37" stroke="#ffe066" stroke-width="1.6" stroke-linecap="round"/>
</g>
<!-- Big left pincer gripping it -->
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="none" stroke="#f0ebe0" stroke-width="2.2" transform="rotate(28 14 21)"/>
</svg>
