<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1.2 -3.67 67.03 67.03">
<!-- Inferno Greg, loss: burned down to a smoldering ember, the fire gone out, a last curl of smoke. X eyes. -->
<!-- Smoke curling up -->
<path d="M32 24 C30 20 34 17 32 13 C30 10 33 7 32 4" fill="none" stroke="#8a8e96" stroke-width="2.4" stroke-linecap="round" opacity="0.65"/>
<path d="M38 26 C37 23 40 21 39 18" fill="none" stroke="#8a8e96" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
<!-- Limp dark legs / claws -->
<g fill="none" stroke="#1f1410" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 40 L13 46 L11 51"/><path d="M24 42 L20 49 L19 54"/><path d="M45 40 L51 46 L53 51"/><path d="M40 42 L44 49 L45 54"/>
  <path d="M17 33 L12 29"/><path d="M47 33 L52 29"/>
</g>
<ellipse cx="13" cy="25" rx="5" ry="4" fill="#2a201c" stroke="#1f1410" stroke-width="2" transform="rotate(28 13 25)"/>
<ellipse cx="55" cy="25" rx="5" ry="4" fill="#2a201c" stroke="#1f1410" stroke-width="2" transform="rotate(-28 55 25)"/>
<!-- Charred ember lump (was the flame body, now slumped and dark) -->
<path d="M14 40 C12 35 14 30 18 28 C24 26 40 26 46 28 C50 30 52 35 50 40 C46 44 38 45 32 45 C26 45 18 44 14 40 Z"
      fill="#2e2420" stroke="#1f1410" stroke-width="2.2"/>
<!-- Soft residual ember glow within the lump (no squiggles) -->
<defs><radialGradient id="infEmber" cx="0.5" cy="0.5" r="0.5">
  <stop offset="0" stop-color="#ff8a3a" stop-opacity="0.75"/>
  <stop offset="0.55" stop-color="#c0461a" stop-opacity="0.3"/>
  <stop offset="1" stop-color="#7a2810" stop-opacity="0"/>
</radialGradient></defs>
<ellipse cx="32" cy="37.5" rx="14" ry="6" fill="url(#infEmber)"/>
<circle cx="25" cy="37" r="1.2" fill="#ffb066" opacity="0.8"/>
<circle cx="39" cy="38" r="1" fill="#ffb066" opacity="0.7"/>
<!-- X eyes -->
<g fill="none" stroke="#6a4a40" stroke-width="2" stroke-linecap="round">
  <path d="M22.5 31 L26 34.5 M26 31 L22.5 34.5"/>
  <path d="M38 31 L41.5 34.5 M41.5 31 L38 34.5"/>
