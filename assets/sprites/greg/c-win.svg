<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Greg direction C, win: shades on, claws up at the corners. The
       sunglasses keep continuity with the emoji slot this replaces. -->
  <!-- Tiny legs -->
  <g fill="none" stroke-linecap="round">
    <g stroke="#232838" stroke-width="8">
      <path d="M36 102 L30 114"/>
      <path d="M48 106 L45 118"/>
      <path d="M92 102 L98 114"/>
      <path d="M80 106 L83 118"/>
    </g>
    <g stroke="#53a05b" stroke-width="3.8">
      <path d="M36 102 L30 114"/>
      <path d="M48 106 L45 118"/>
      <path d="M92 102 L98 114"/>
      <path d="M80 106 L83 118"/>
    </g>
  </g>
  <!-- Claw arms raised -->
  <g fill="none" stroke-linecap="round">
    <path d="M22 56 L13 45" stroke="#232838" stroke-width="10"/>
    <path d="M106 56 L115 45" stroke="#232838" stroke-width="10"/>
    <path d="M22 56 L13 45" stroke="#53a05b" stroke-width="5"/>
    <path d="M106 56 L115 45" stroke="#53a05b" stroke-width="5"/>
  </g>
  <!-- Open pincers up at the corners -->
  <path d="M14 44 C5 42 2 33 8 26 L13 31 L12 22 C21 20 26 27 23 35 C21 41 18 45 14 44 Z"
        fill="#53a05b" stroke="#232838" stroke-width="4.5" stroke-linejoin="round"/>
  <path d="M114 44 C123 42 126 33 120 26 L115 31 L116 22 C107 20 102 27 105 35 C107 41 110 45 114 44 Z"
        fill="#53a05b" stroke="#232838" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Stalk nubs -->
  <ellipse cx="46" cy="24" rx="7" ry="8" fill="#53a05b" stroke="#232838" stroke-width="5"/>
  <ellipse cx="82" cy="24" rx="7" ry="8" fill="#53a05b" stroke="#232838" stroke-width="5"/>
  <!-- Shell face -->
  <path d="M14 68 C14 40 36 25 64 25 C92 25 114 40 114 68 C114 92 94 106 64 106 C34 106 14 92 14 68 Z"
        fill="#53a05b" stroke="#232838" stroke-width="6"/>
  <path d="M22 80 C34 96 94 96 106 80 C98 98 82 104 64 104 C46 104 30 98 22 80 Z" fill="#3e7f46"/>
  <!-- Mottling -->
  <g fill="#7cc184">
    <circle cx="32" cy="46" r="3.6"/>
    <circle cx="96" cy="46" r="3.2"/>
  </g>
  <!-- Sunglasses -->
  <path d="M22 50 L106 50" stroke="#232838" stroke-width="5" stroke-linecap="round"/>
  <rect x="31" y="45" width="29" height="20" rx="8" fill="#232838"/>
  <rect x="68" y="45" width="29" height="20" rx="8" fill="#232838"/>
  <path d="M38 52 L46 49" stroke="#8a93b0" stroke-width="3" stroke-linecap="round"/>
  <path d="M75 52 L83 49" stroke="#8a93b0" stroke-width="3" stroke-linecap="round"/>
  <!-- Big grin -->
  <path d="M46 76 Q64 94 82 76 Z" fill="#232838" stroke="#232838" stroke-width="4.5" stroke-linejoin="round"/>
  <path d="M56 85 Q64 91 72 85 Q68 89 64 89 Q60 89 56 85 Z" fill="#e4453a"/>
  <!-- Sparks -->
  <g fill="#ffd23e" stroke="#b8860b" stroke-width="2.5" stroke-linejoin="round">
    <path d="M28 8 L30 13 L35 14 L31 17 L32 23 L27 19 L22 22 L24 16 L20 12 L25 12 Z"/>
    <path d="M100 6 L102 11 L107 12 L103 15 L104 21 L99 17 L94 20 L96 14 L92 10 L97 10 Z"/>
  </g>
</svg>
