<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
<!-- Nest Greg, idle: a crab kitted out as a bird — feathered wings, a beak, perched in a twig nest with his field slate. -->
<!-- nest back rim -->
<path d="M9 49 Q36 40 63 49" fill="none" stroke="#8a5e30" stroke-width="2.8" stroke-linecap="round"/>
<!-- wings (behind body), feathered, fanning out past the shell -->
<g stroke="#357aa8" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" fill="#a8d8f4">
  <path d="M20 30 C10 24 2 26 2 32 C6 31 9 31 12 32 C4 34 2 39 4 43 C9 41 12 41 15 42 C11 44 10 47 13 49 C19 43 22 36 20 30 Z"/>
  <path d="M52 30 C62 24 70 26 70 32 C66 31 63 31 60 32 C68 34 70 39 68 43 C63 41 60 41 57 42 C61 44 62 47 59 49 C53 43 50 36 52 30 Z"/>
</g>
<g fill="none" stroke="#6aa8d4" stroke-width="1.2" stroke-linecap="round" opacity="0.85">
  <path d="M14 33 L6 32 M13 38 L6 40 M58 33 L66 32 M59 38 L66 40"/>
</g>
<!-- legs tucked into the nest -->
<g fill="none" stroke="#232838" stroke-width="3" stroke-linecap="round">
  <path d="M25 47 L21 53 M32 49 L29 55 M40 49 L43 55 M47 47 L51 53"/>
</g>
<!-- body -->
<path d="M14 34 C14 23 23 16 36 16 C49 16 58 23 58 34 C58 43 48 48 36 48 C24 48 14 43 14 34 Z"
      fill="#53a05b" stroke="#232838" stroke-width="3.2"/>
<path d="M19 38 C27 45 45 45 53 38 C49 46 43 49 36 49 C29 49 23 46 19 38 Z" fill="#3e7f46"/>
<g fill="#7cc184"><circle cx="25" cy="27" r="1.9"/><circle cx="45" cy="25" r="1.7"/><circle cx="49" cy="33" r="1.6"/></g>
<!-- eye stalks + eyes -->
<g fill="none" stroke="#232838" stroke-width="3"><path d="M28 18 L26 11"/><path d="M44 18 L46 11"/></g>
<circle cx="26" cy="9" r="5" fill="#ffffff" stroke="#232838" stroke-width="2.6"/>
<circle cx="46" cy="9" r="5" fill="#ffffff" stroke="#232838" stroke-width="2.6"/>
<circle cx="27" cy="10" r="2" fill="#232838"/>
<circle cx="45" cy="10" r="2" fill="#232838"/>
<!-- beak -->
<path d="M32.5 27 L36 33.5 L39.5 27 Q36 25 32.5 27 Z" fill="#f4a93a" stroke="#232838" stroke-width="2.2" stroke-linejoin="round"/>
<!-- smile -->
<path d="M30 36.5 Q36 41.5 42 36.5" fill="none" stroke="#232838" stroke-width="2.4" stroke-linecap="round"/>
<!-- claws -->
<ellipse cx="14" cy="41" rx="6" ry="5" fill="#53a05b" stroke="#232838" stroke-width="3" transform="rotate(26 14 41)"/>
<ellipse cx="58" cy="41" rx="6" ry="5" fill="#53a05b" stroke="#232838" stroke-width="3" transform="rotate(-26 58 41)"/>
<!-- field slate held front-left -->
<g transform="rotate(6 22 52)"><rect x="16" y="46" width="13" height="16" rx="2" fill="#f3f6fb" stroke="#232838" stroke-width="2.6"/><g fill="none" stroke="#9aa6bc" stroke-width="1.4"><path d="M19 51 L26 51 M19 55 L26 55"/></g></g>
<!-- nest front rim -->
<g fill="none" stroke="#a9743f" stroke-width="2.6" stroke-linecap="round">
  <path d="M11 49 Q36 60 61 49"/>
  <path d="M31 54 L35 50 M40 54 L44 50 M49 52 L53 48"/>
</g>
</svg>
