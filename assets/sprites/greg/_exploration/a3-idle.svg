<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- A drill-down, variant 3: WIDE CARAPACE. True crab proportions,
       wider than tall with three soft front lobes, but keeping A's
       friendly cartoon face and props. -->
  <!-- Walking legs -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#232838" stroke-width="9">
      <path d="M38 82 L26 94 L22 105"/>
      <path d="M48 87 L40 100 L38 110"/>
      <path d="M90 82 L102 94 L106 105"/>
      <path d="M80 87 L88 100 L90 110"/>
    </g>
    <g stroke="#53a05b" stroke-width="4.5">
      <path d="M38 82 L26 94 L22 105"/>
      <path d="M48 87 L40 100 L38 110"/>
      <path d="M90 82 L102 94 L106 105"/>
      <path d="M80 87 L88 100 L90 110"/>
    </g>
  </g>
  <!-- Arms -->
  <g fill="none" stroke-linecap="round">
    <path d="M36 66 L24 56" stroke="#232838" stroke-width="10"/>
    <path d="M92 66 L104 54" stroke="#232838" stroke-width="10"/>
    <path d="M36 66 L24 56" stroke="#53a05b" stroke-width="5"/>
    <path d="M92 66 L104 54" stroke="#53a05b" stroke-width="5"/>
  </g>
  <!-- Eye stalks -->
  <g fill="none" stroke-linecap="round">
    <path d="M52 40 L48 28" stroke="#232838" stroke-width="10"/>
    <path d="M76 40 L80 28" stroke="#232838" stroke-width="10"/>
    <path d="M52 40 L48 28" stroke="#53a05b" stroke-width="5"/>
    <path d="M76 40 L80 28" stroke="#53a05b" stroke-width="5"/>
  </g>
  <circle cx="47" cy="22" r="9" fill="#ffffff" stroke="#232838" stroke-width="5"/>
  <circle cx="81" cy="22" r="9" fill="#ffffff" stroke="#232838" stroke-width="5"/>
  <circle cx="48.5" cy="23.5" r="3.4" fill="#232838"/>
  <circle cx="79.5" cy="23.5" r="3.4" fill="#232838"/>
  <circle cx="50" cy="22" r="1.2" fill="#ffffff"/>
  <circle cx="81" cy="22" r="1.2" fill="#ffffff"/>
  <!-- Carapace: wide, three soft front lobes -->
  <path d="M22 62 C22 48 32 38 44 35 Q54 30 64 30 Q74 30 84 35 C96 38 106 48 106 62 C106 76 90 86 64 86 C38 86 22 76 22 62 Z"
        fill="#53a05b" stroke="#232838" stroke-width="6"/>
  <path d="M30 68 C40 78 88 78 98 68 C92 80 80 84 64 84 C48 84 36 80 30 68 Z" fill="#3e7f46"/>
  <!-- Soft lobe hints on the front edge -->
  <g fill="none" stroke="#3e7f46" stroke-width="3.5" stroke-linecap="round">
    <path d="M40 38 Q44 35 48 37"/>
    <path d="M80 37 Q84 35 88 38"/>
  </g>
  <!-- Mottling -->
  <g fill="#7cc184">
    <circle cx="44" cy="48" r="3.2"/>
    <circle cx="66" cy="42" r="2.8"/>
    <circle cx="86" cy="50" r="3"/>
    <circle cx="55" cy="56" r="2.2"/>
  </g>
  <!-- Smile -->
  <path d="M54 68 Q64 76 74 68" fill="none" stroke="#232838" stroke-width="5" stroke-linecap="round"/>
  <!-- Right pincer gripping pencil -->
  <ellipse cx="108" cy="49" rx="9.5" ry="7.5" fill="#53a05b" stroke="#232838" stroke-width="5" transform="rotate(-35 108 49)"/>
  <ellipse cx="113" cy="42" rx="4.8" ry="3.8" fill="#e8873a" stroke="#232838" stroke-width="4" transform="rotate(-35 113 42)"/>
  <g transform="rotate(-55 108 47)">
    <rect x="98" y="43.5" width="24" height="7" rx="2" fill="#ffd23e" stroke="#232838" stroke-width="3.5"/>
    <path d="M122 43.5 L128 47 L122 50.5 Z" fill="#232838"/>
    <rect x="93" y="43.5" width="5.5" height="7" rx="2" fill="#e88a8a" stroke="#232838" stroke-width="3"/>
  </g>
  <!-- Clipboard -->
  <g transform="rotate(-8 16 62)">
    <rect x="3" y="44" width="27" height="37" rx="3.5" fill="#f3f6fb" stroke="#232838" stroke-width="4.5"/>
    <rect x="11" y="39" width="11" height="8" rx="2.5" fill="#b9c2d4" stroke="#232838" stroke-width="3.5"/>
    <g fill="#d4dae6">
      <rect x="8" y="53" width="6" height="6" rx="1.2"/>
      <rect x="16" y="53" width="6" height="6" rx="1.2"/>
      <rect x="24" y="53" width="6" height="6" rx="1.2"/>
      <rect x="8" y="61" width="6" height="6" rx="1.2"/>
      <rect x="24" y="61" width="6" height="6" rx="1.2"/>
    </g>
    <rect x="16" y="61" width="6" height="6" rx="1.2" fill="#ffd23e"/>
    <path d="M10 76 L10 68 L17 70 L10 72" fill="#e4453a"/>
  </g>
  <ellipse cx="27" cy="49" rx="8.5" ry="7" fill="#53a05b" stroke="#232838" stroke-width="5" transform="rotate(28 27 49)"/>
  <ellipse cx="32" cy="43" rx="4.2" ry="3.4" fill="#e8873a" stroke="#232838" stroke-width="4" transform="rotate(28 32 43)"/>
</svg>
