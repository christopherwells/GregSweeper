<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2.69 -5.1 134.19 134.19">
  <!-- Greg direction C, loss: flipped clean over. Flat underside up,
       dome down, legs in the air; X eyes and a little o mouth read the
       same at any rotation, so the face stays legible upside down. -->
  <!-- Legs waving up from the flipped underside -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#232838" stroke-width="8">
      <path d="M38 44 L32 30 L36 20"/>
      <path d="M52 42 L50 26 L56 18"/>
      <path d="M76 42 L78 26 L72 18"/>
      <path d="M90 44 L96 30 L92 20"/>
    </g>
    <g stroke="#53a05b" stroke-width="3.8">
      <path d="M38 44 L32 30 L36 20"/>
      <path d="M52 42 L50 26 L56 18"/>
      <path d="M76 42 L78 26 L72 18"/>
      <path d="M90 44 L96 30 L92 20"/>
    </g>
  </g>
  <!-- Claw arms splayed at the upper sides -->
  <g fill="none" stroke-linecap="round">
    <path d="M28 52 L16 46" stroke="#232838" stroke-width="10"/>
    <path d="M100 52 L112 46" stroke="#232838" stroke-width="10"/>
    <path d="M28 52 L16 46" stroke="#53a05b" stroke-width="5"/>
    <path d="M100 52 L112 46" stroke="#53a05b" stroke-width="5"/>
  </g>
  <ellipse cx="13" cy="42" rx="8.5" ry="6.5" fill="#53a05b" stroke="#232838" stroke-width="5" transform="rotate(-30 13 42)"/>
  <ellipse cx="9" cy="36" rx="4" ry="3.2" fill="#e8873a" stroke="#232838" stroke-width="3.5" transform="rotate(-30 9 36)"/>
  <ellipse cx="115" cy="42" rx="8.5" ry="6.5" fill="#53a05b" stroke="#232838" stroke-width="5" transform="rotate(30 115 42)"/>
  <ellipse cx="119" cy="36" rx="4" ry="3.2" fill="#e8873a" stroke="#232838" stroke-width="3.5" transform="rotate(30 119 36)"/>
  <!-- Shell flipped: flat underside up, dome down -->
  <path d="M16 54 L112 54 C112 84 94 104 64 104 C34 104 16 84 16 54 Z"
        fill="#53a05b" stroke="#232838" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="64" cy="54" rx="48" ry="9" fill="#dce8b4" stroke="#232838" stroke-width="5"/>
  <path d="M40 54 Q64 60 88 54" fill="none" stroke="#b5c48c" stroke-width="3" stroke-linecap="round"/>
  <path d="M24 90 C36 100 92 100 104 90 C94 102 80 102 64 102 C48 102 34 102 24 90 Z" fill="#3e7f46"/>
  <!-- Upside-down face on the dome: X eyes + o mouth -->
  <circle cx="46" cy="76" r="10.5" fill="#ffffff" stroke="#232838" stroke-width="5"/>
  <circle cx="82" cy="76" r="10.5" fill="#ffffff" stroke="#232838" stroke-width="5"/>
  <path d="M41.5 71.5 L50.5 80.5 M50.5 71.5 L41.5 80.5" stroke="#232838" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M77.5 71.5 L86.5 80.5 M86.5 71.5 L77.5 80.5" stroke="#232838" stroke-width="3.6" stroke-linecap="round"/>
  <ellipse cx="64" cy="92" rx="6" ry="6.5" fill="#232838"/>
  <!-- Dizzy wobble + sweat drop -->
  <path d="M48 9 Q56 3 64 9 Q72 15 80 9" fill="none" stroke="#9fb0d8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M104 62 C104 57 108 52 108 52 C108 52 112 57 112 62 A4 4.4 0 1 1 104 62 Z" fill="#4a78c8" stroke="#232838" stroke-width="3"/>
</svg>
