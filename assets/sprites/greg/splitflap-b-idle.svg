<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Splitflap airplane B: a jet airliner, swept wings with engine pods, a cabin-window row, no propeller. -->
<!-- Swept wings -->
<path d="M19 31 L2 38 L5 41 L21 35 Z" fill="#c2cad4" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<path d="M45 31 L62 38 L59 41 L43 35 Z" fill="#c2cad4" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<!-- Under-wing engine pods -->
<ellipse cx="11" cy="38" rx="3" ry="2" fill="#3a4350"/><ellipse cx="53" cy="38" rx="3" ry="2" fill="#3a4350"/>
<!-- Tail fin -->
<path d="M30 16 L34 16 L33 6 L31 6 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<path d="M26 19 L38 19 L37 23 L27 23 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<!-- Sleek fuselage -->
<path d="M14 31 C14 22 20 16 32 15 C44 16 50 22 50 31 C50 40 43 45 32 45 C21 45 14 40 14 31 Z" fill="#eef2f6" stroke="#3a4350" stroke-width="2.4"/>
<path d="M14 31 Q32 33 50 31" stroke="#e0466b" stroke-width="2" fill="none"/>
<!-- Cabin window row -->
<g fill="#3a78c8"><circle cx="20" cy="36" r="1.1"/><circle cx="26" cy="38" r="1.1"/><circle cx="32" cy="38.5" r="1.1"/><circle cx="38" cy="38" r="1.1"/><circle cx="44" cy="36" r="1.1"/></g>
<!-- Cockpit eyes -->
<circle cx="24" cy="25" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
<circle cx="40" cy="25" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
<circle cx="24.7" cy="25.5" r="1.4" fill="#3a4350"/><circle cx="40.7" cy="25.5" r="1.4" fill="#3a4350"/>
<path d="M28 31 Q32 34 36 31" fill="none" stroke="#3a4350" stroke-width="2" stroke-linecap="round"/>
<!-- Gear -->
<g fill="#2a2d36" stroke="#3a4350" stroke-width="1.2"><circle cx="24" cy="47" r="2.4"/><circle cx="40" cy="47" r="2.4"/></g>
<g stroke="#3a4350" stroke-width="1.4"><path d="M24 44 L24 45 M40 44 L40 45"/></g>
</svg>
