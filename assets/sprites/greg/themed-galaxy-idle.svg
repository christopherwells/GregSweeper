<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Galaxy Greg: a constellation. Star nodes at the joints, thin
     glowing lines between them, the brightest pair for eyes.
     The Crab, charted. -->
<!-- Constellation lines: shell polygon -->
<g fill="none" stroke="#ea80fc" stroke-width="1.4" opacity="0.85">
  <path d="M12 31 L20 19 L32 15.5 L44 19 L52 31 L44 41 L32 43.5 L20 41 Z"/>
</g>
<!-- Leg lines with star tips -->
<g fill="none" stroke="#82b1ff" stroke-width="1.2" opacity="0.8">
  <path d="M20 41 L13 47 L11 52.5"/>
  <path d="M26 43 L21 50 L20 55"/>
  <path d="M44 41 L51 47 L53 52.5"/>
  <path d="M38 43 L43 50 L44 55"/>
  <path d="M14 33 L8 28"/>
  <path d="M50 33 L56 27"/>
</g>
<!-- Claw clusters -->
<g fill="none" stroke="#ea80fc" stroke-width="1.3" opacity="0.85">
  <path d="M8 28 L4.5 22.5 L9 18.5 L13 22"/>
  <path d="M56 27 L59.5 21.5 L55 17.5 L51 21"/>
</g>
<!-- Eye stalk lines -->
<g fill="none" stroke="#82b1ff" stroke-width="1.2" opacity="0.8">
  <path d="M26 17 L23.5 10.5"/>
  <path d="M38 17 L40.5 10.5"/>
</g>
<!-- Smile arc, faint nebula trace -->
<path d="M27 31 Q32 36 37 31" fill="none" stroke="#ffd9ff" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
<!-- Joint stars -->
<g fill="#e8d8ff">
  <circle cx="12" cy="31" r="1.5"/>
  <circle cx="20" cy="19" r="1.5"/>
  <circle cx="32" cy="15.5" r="1.7"/>
  <circle cx="44" cy="19" r="1.5"/>
  <circle cx="52" cy="31" r="1.5"/>
  <circle cx="44" cy="41" r="1.4"/>
  <circle cx="32" cy="43.5" r="1.5"/>
  <circle cx="20" cy="41" r="1.4"/>
  <circle cx="11" cy="52.5" r="1.1"/>
  <circle cx="20" cy="55" r="1"/>
  <circle cx="53" cy="52.5" r="1.1"/>
  <circle cx="44" cy="55" r="1"/>
  <circle cx="4.5" cy="22.5" r="1.2"/>
  <circle cx="9" cy="18.5" r="1.2"/>
  <circle cx="59.5" cy="21.5" r="1.2"/>
  <circle cx="55" cy="17.5" r="1.2"/>
</g>
<!-- The eyes: the brightest stars, with glow -->
<circle cx="23.5" cy="9" r="3.4" fill="#ffd9ff" opacity="0.25"/>
<circle cx="40.5" cy="9" r="3.4" fill="#ffd9ff" opacity="0.25"/>
<circle cx="23.5" cy="9" r="1.9" fill="#ffffff"/>
<circle cx="40.5" cy="9" r="1.9" fill="#ffffff"/>
<!-- Field stars -->
<g fill="#e8d8ff" opacity="0.7">
  <circle cx="6" cy="42" r="0.7"/>
  <circle cx="58" cy="44" r="0.7"/>
  <circle cx="50" cy="8" r="0.8"/>
  <circle cx="14" cy="8" r="0.6"/>
  <circle cx="60" cy="58" r="0.6"/>
</g>
</svg>
