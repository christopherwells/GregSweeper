<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Neon Greg, loss: a sign on the blink. Flipped, the right claw tube burnt out and dark, eyes dimmed to flickering X's. -->
<!-- glow underlay (shell only) -->
<path d="M12 38 C12 42 15 46 20 48.5 Q26 51 32 51 Q38 51 44 48.5 C49 46 52 42 52 38 L52 37 L12 37 Z"
      fill="none" stroke="#ff4fa3" stroke-width="5.5" opacity="0.22" stroke-linejoin="round"/>
<!-- legs up (cyan, one flickering dim) -->
<g fill="none" stroke="#41e0e8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <path d="M21 35 Q17 28 19 23"/>
  <path d="M27.5 34 Q25.5 26 28.5 21"/>
  <path d="M36.5 34 Q38.5 26 35.5 21" opacity="0.3"/>
  <path d="M43 35 Q47 28 45 23"/>
  <path d="M15 39 Q12 38 9 36"/>
  <path d="M49 39 Q52 38 55 36" opacity="0.3"/>
</g>
<!-- limp claws: left lit, right dead -->
<ellipse cx="6.5" cy="33.5" rx="5" ry="4" fill="none" stroke="#41e0e8" stroke-width="2.2" transform="rotate(-30 6.5 33.5)"/>
<ellipse cx="57.5" cy="33.5" rx="5" ry="4" fill="none" stroke="#3a4046" stroke-width="2.2" transform="rotate(30 57.5 33.5)"/>
<!-- Overturned pink shell -->
<path d="M12 38 C12 42 15 46 20 48.5 Q26 51 32 51 Q38 51 44 48.5 C49 46 52 42 52 38 L52 37 L12 37 Z"
      fill="none" stroke="#ff4fa3" stroke-width="2.6" stroke-linejoin="round"/>
<path d="M12 37 L52 37" stroke="#ff4fa3" stroke-width="2.4"/>
<!-- Flopped stalks + flickering X eyes -->
<g fill="none" stroke="#41e0e8" stroke-width="2.4" stroke-linecap="round">
  <path d="M17 37 Q13 33 11.5 30"/>
  <path d="M22.5 36 Q21.5 31 21 27.5"/>
</g>
<path d="M8.7 24.7 L12.3 28.3 M12.3 24.7 L8.7 28.3" stroke="#9af4f8" stroke-width="1.8" stroke-linecap="round"/>
<path d="M18.7 22.2 L22.3 25.8 M22.3 22.2 L18.7 25.8" stroke="#9af4f8" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
</svg>
