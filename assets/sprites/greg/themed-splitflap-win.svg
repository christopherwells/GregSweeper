<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Splitflap Greg, win: cleared for takeoff. The biplane climbing away, prop spinning, contrails streaming. -->
<!-- Contrails -->
<g fill="none" stroke="#cfe0ee" stroke-width="2.2" stroke-linecap="round" opacity="0.7" stroke-dasharray="3 3">
  <path d="M5 57 C13 53 19 49 25 43"/>
  <path d="M11 59 C19 55 25 51 31 45"/>
</g>
<g transform="rotate(-18 32 31)">
  <!-- upper wing -->
  <rect x="6" y="18" width="52" height="5" rx="2.5" fill="#c2cad4" stroke="#3a4350" stroke-width="2"/>
  <!-- struts -->
  <g stroke="#3a4350" stroke-width="2" stroke-linecap="round"><path d="M16 23 L18 30 M48 23 L46 30 M28 23 L29 29 M36 23 L35 29"/></g>
  <!-- lower wing -->
  <rect x="10" y="36" width="44" height="5" rx="2.5" fill="#b8c0ca" stroke="#3a4350" stroke-width="2"/>
  <!-- tail fin -->
  <path d="M30 16 L34 16 L33 9 L31 9 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <!-- fuselage -->
  <path d="M18 31 C18 24 23 19 32 18 C41 19 46 24 46 31 C46 38 41 43 32 43 C23 43 18 38 18 31 Z" fill="#eef2f6" stroke="#3a4350" stroke-width="2.4"/>
  <path d="M18 31 Q32 33 46 31" stroke="#e0466b" stroke-width="1.8" fill="none"/>
  <!-- spinning prop disc -->
  <circle cx="32" cy="44" r="6" fill="none" stroke="#3a4350" stroke-width="1" opacity="0.4"/>
  <circle cx="32" cy="44" r="2.2" fill="#3a4350"/>
  <!-- goggles strap -->
  <path d="M19 23 Q32 21 45 23" stroke="#5a4a3a" stroke-width="1.6" fill="none"/>
  <!-- happy eyes -->
  <circle cx="25" cy="26" r="3.4" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
  <circle cx="39" cy="26" r="3.4" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
  <path d="M23 26.5 Q25 24 27 26.5" fill="none" stroke="#3a4350" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M37 26.5 Q39 24 41 26.5" fill="none" stroke="#3a4350" stroke-width="1.6" stroke-linecap="round"/>
  <!-- grin -->
  <path d="M27 32 Q32 36.5 37 32 Z" fill="#3a4350"/>
</g>
<!-- takeoff sparkle -->
<g stroke="#e8b73a" stroke-width="1.6" stroke-linecap="round"><path d="M54 9 L54 14 M51.5 11.5 L56.5 11.5"/></g>
</svg>
