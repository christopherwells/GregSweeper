<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
<!-- Nest Greg, loss: tipped onto his back in the nest, legs up, wings splayed, X eyes, a cracked egg beside him. -->
<!-- nest -->
<path d="M8 43 Q36 55 64 43" fill="none" stroke="#8a5e30" stroke-width="2.8" stroke-linecap="round"/>
<path d="M12 50 Q36 60 60 50" fill="none" stroke="#a9743f" stroke-width="2.6" stroke-linecap="round"/>
<!-- legs up in the air -->
<g fill="none" stroke="#232838" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <path d="M22 39 L18 31 L20 26"/><path d="M29 38 L27 30 L30 25"/>
  <path d="M43 38 L45 30 L42 25"/><path d="M50 39 L54 31 L52 26"/>
</g>
<!-- splayed wings -->
<g stroke="#357aa8" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="#a8d8f4">
  <path d="M15 41 C7 40 2 42 3 47 C6 46 9 45 11 46 C8 48 8 51 11 51 C15 48 17 44 15 41 Z"/>
  <path d="M57 41 C65 40 70 42 69 47 C66 46 63 45 61 46 C64 48 64 51 61 51 C57 48 55 44 57 41 Z"/>
</g>
<!-- overturned body (underside up) -->
<path d="M14 41 C14 45 18 49 24 51 Q36 54 48 51 C54 49 58 45 58 41 L58 40 L14 40 Z" fill="#3e7f46" stroke="#232838" stroke-width="3" stroke-linejoin="round"/>
<ellipse cx="36" cy="40" rx="22" ry="4" fill="#53a05b" stroke="#232838" stroke-width="2.4"/>
<!-- flopped stalks + X eyes -->
<g fill="none" stroke="#232838" stroke-width="3" stroke-linecap="round"><path d="M21 40 L14 34"/><path d="M28 39 L25 31"/></g>
<circle cx="12" cy="32" r="5" fill="#ffffff" stroke="#232838" stroke-width="2.6"/>
<path d="M9.7 29.7 L14.3 34.3 M14.3 29.7 L9.7 34.3" stroke="#232838" stroke-width="1.8" stroke-linecap="round"/>
<circle cx="25" cy="28" r="5" fill="#ffffff" stroke="#232838" stroke-width="2.6"/>
<path d="M22.7 25.7 L27.3 30.3 M27.3 25.7 L22.7 30.3" stroke="#232838" stroke-width="1.8" stroke-linecap="round"/>
<!-- a cracked egg beside him -->
<g transform="translate(51 38)">
  <path d="M-7 3 L-4 -1 L-1 3 L2 -1 L5 3 L7 0 L7 6 Q0 9 -7 6 Z" fill="#f7eedb" stroke="#3a2e1e" stroke-width="2" stroke-linejoin="round"/>
  <path d="M-7 0 L-4 -5 Q0 -7 4 -5 L7 0 L5 3 L2 -2 L-1 3 L-4 -2 Z" fill="#fbf5e6" stroke="#3a2e1e" stroke-width="2" stroke-linejoin="round"/>
</g>
</svg>
