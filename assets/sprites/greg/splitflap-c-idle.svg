<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Splitflap airplane C: a vintage biplane, two stacked wings on struts, a nose propeller. -->
<!-- Upper wing -->
<rect x="6" y="18" width="52" height="5" rx="2.5" fill="#c2cad4" stroke="#3a4350" stroke-width="2"/>
<!-- Struts -->
<g stroke="#3a4350" stroke-width="2" stroke-linecap="round"><path d="M16 23 L18 30 M48 23 L46 30 M28 23 L29 29 M36 23 L35 29"/></g>
<!-- Lower wing -->
<rect x="10" y="36" width="44" height="5" rx="2.5" fill="#b8c0ca" stroke="#3a4350" stroke-width="2"/>
<!-- Tail fin -->
<path d="M30 16 L34 16 L33 9 L31 9 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
<!-- Fuselage -->
<path d="M18 31 C18 24 23 19 32 18 C41 19 46 24 46 31 C46 38 41 43 32 43 C23 43 18 38 18 31 Z" fill="#eef2f6" stroke="#3a4350" stroke-width="2.4"/>
<path d="M18 31 Q32 33 46 31" stroke="#e0466b" stroke-width="1.8" fill="none"/>
<!-- Propeller spinner at the nose -->
<g transform="rotate(20 32 43)"><path d="M32 37 L32 49 M26 43 L38 43" stroke="#3a4350" stroke-width="2.4" stroke-linecap="round"/></g>
<circle cx="32" cy="43" r="2.2" fill="#3a4350"/>
<!-- Open-cockpit eyes + goggles strap -->
<path d="M19 23 Q32 21 45 23" stroke="#5a4a3a" stroke-width="1.6" fill="none"/>
<circle cx="25" cy="26" r="3.4" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
<circle cx="39" cy="26" r="3.4" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
<circle cx="25.6" cy="26.5" r="1.3" fill="#3a4350"/><circle cx="39.6" cy="26.5" r="1.3" fill="#3a4350"/>
<path d="M28 32 Q32 35 36 32" fill="none" stroke="#3a4350" stroke-width="2" stroke-linecap="round"/>
<!-- Gear -->
<g fill="#2a2d36" stroke="#3a4350" stroke-width="1.2"><circle cx="24" cy="47" r="2.6"/><circle cx="40" cy="47" r="2.6"/></g>
<g stroke="#3a4350" stroke-width="1.4"><path d="M24 41 L24 45 M40 41 L40 45 M24 45 L40 45"/></g>
</svg>
