<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Splitflap Greg, loss: the biplane down in a heap, wings snapped, the nose buried and well ablaze. -->
<!-- Black smoke billowing up -->
<g fill="#3a3d44" opacity="0.85">
  <circle cx="41" cy="16" r="6"/><circle cx="48" cy="10" r="4.6"/><circle cx="36" cy="9" r="3.8"/><circle cx="52" cy="5" r="3.2"/><circle cx="44" cy="4" r="2.6"/>
</g>
<g fill="#5a5e66" opacity="0.55"><circle cx="42" cy="14" r="2.8"/><circle cx="47" cy="9" r="2.2"/></g>
<!-- Snapped upper wing slid onto the ground (left) -->
<g transform="rotate(24 12 50)">
  <rect x="2" y="47" width="26" height="4.5" rx="2" fill="#a8b0ba" stroke="#3a4350" stroke-width="2"/>
  <path d="M9 47 L10 43 M17 47 L18 43" stroke="#3a4350" stroke-width="1.4" stroke-linecap="round"/>
</g>
<!-- Wrecked biplane, nose buried, tilted -->
<g transform="rotate(-15 34 36)">
  <!-- bent lower wing, both sides -->
  <path d="M44 38 L60 41 L59 45 L43 42 Z" fill="#b8c0ca" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <path d="M20 38 L13 40 L14 44 L21 42 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <!-- broken struts -->
  <g stroke="#3a4350" stroke-width="2" stroke-linecap="round"><path d="M26 33 L24 27 M40 33 L43 28"/></g>
  <!-- bent tail fin -->
  <path d="M30 22 L34 21 L35 13 L31 15 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <!-- fuselage -->
  <path d="M17 34 C17 26 23 20 32 19 C45 20 49 26 49 34 C49 42 43 47 32 47 C22 47 17 42 17 34 Z" fill="#e6ebf0" stroke="#3a4350" stroke-width="2.4"/>
  <path d="M18 36 C23 42 27 44 32 44 C37 44 43 42 47 36 C44 41 39 42.5 32 42.5 C25 42.5 20 41 18 36 Z" fill="#3a78c8"/>
  <!-- hull cracks -->
  <path d="M26 23 L29 28 L25 32 M40 25 L37 30 L41 34" stroke="#3a4350" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- X cockpit windows -->
  <circle cx="25" cy="27" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
  <circle cx="39" cy="27" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
  <path d="M23.2 25.2 L26.8 28.8 M26.8 25.2 L23.2 28.8" stroke="#3a4350" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M37.2 25.2 L40.8 28.8 M40.8 25.2 L37.2 28.8" stroke="#3a4350" stroke-width="1.5" stroke-linecap="round"/>
</g>
<!-- Big fire engulfing the buried nose -->
<g>
  <!-- orange flame body across the nose -->
  <path d="M18 51 C17 46 20 44 22 46 C22 40 26 39 27 44 C28 36 33 36 34 44 C35 37 39 38 40 45 C43 43 47 46 46 51 Z" fill="#ff7a26"/>
  <!-- side licks -->
  <path d="M24 47 C22 43 23 38 25 36 C27 39 27 44 25 47 Z" fill="#ff9a36"/>
  <path d="M40 47 C38 43 39 39 41 37 C42 40 42 45 40 47 Z" fill="#ff9a36"/>
  <!-- tall central lick -->
  <path d="M29 46 C26 41 30 33 32 29 C34 33 38 41 35 46 Z" fill="#ff7a26"/>
  <!-- yellow inner core -->
  <path d="M23 50 C22 46 24 44 26 46 C27 41 30 41 31 46 C32 42 35 43 36 47 C37 45 39 47 39 50 Z" fill="#ffd23e"/>
  <path d="M31 45 C29 41 31 35 32 32 C33 35 35 41 33 45 Z" fill="#ffd23e"/>
</g>
<!-- rising sparks -->
<g fill="#ffd23e"><circle cx="29" cy="27" r="1"/><circle cx="38" cy="30" r="0.9"/><circle cx="24" cy="33" r="0.8"/></g>
</svg>
