<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Splitflap Greg, loss: crash-landed. Right way up but wrecked, a wing snapped off, the nose ablaze, black smoke pouring up. -->
<!-- Black smoke billowing -->
<g fill="#3a3d44" opacity="0.85">
  <circle cx="40" cy="18" r="5"/><circle cx="46" cy="12" r="4"/><circle cx="36" cy="11" r="3.4"/><circle cx="50" cy="7" r="3"/><circle cx="42" cy="6" r="2.4"/>
</g>
<g fill="#5a5e66" opacity="0.6"><circle cx="41" cy="16" r="2.6"/><circle cx="45" cy="11" r="2"/></g>
<!-- Snapped-off wing, lying on the ground -->
<g transform="rotate(28 10 48)">
  <path d="M2 45 L20 43 L20 48 L3 50 Z" fill="#a8b0ba" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <path d="M20 43 L23 45 L20 48 Z" fill="#8a929c" stroke="#3a4350" stroke-width="1.4" stroke-linejoin="round"/>
</g>
<!-- Wrecked fuselage, right way up, tilted into the dirt -->
<g transform="rotate(-12 34 36)">
  <!-- remaining right wing -->
  <path d="M44 33 L60 38 L58 42 L43 38 Z" fill="#b8c0ca" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <!-- snapped wing stub on the left -->
  <path d="M20 34 L13 35 L14 39 L21 38 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <path d="M13 35 L11 33 M13 37 L11 39" stroke="#3a4350" stroke-width="1.4" stroke-linecap="round"/>
  <!-- bent tail fin -->
  <path d="M30 20 L34 19 L34 11 L31 13 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <!-- fuselage -->
  <path d="M15 33 C15 25 21 19 32 18 C45 19 51 25 51 33 C51 41 44 46 32 46 C21 46 15 41 15 33 Z" fill="#e6ebf0" stroke="#3a4350" stroke-width="2.4"/>
  <path d="M16 35 C21 41 27 43 32 43 C37 43 44 41 49 35 C46 40 39 41.5 32 41.5 C25 41.5 19 40 16 35 Z" fill="#3a78c8"/>
  <!-- hull cracks -->
  <path d="M26 22 L29 27 L25 31 M40 24 L37 29 L41 33" stroke="#3a4350" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- bent prop -->
  <path d="M32 44 L30 50 M32 44 L37 47" stroke="#3a4350" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="32" cy="44" r="2.2" fill="#3a4350"/>
  <!-- X cockpit windows -->
  <circle cx="24" cy="26" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
  <circle cx="40" cy="26" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
  <path d="M22.2 24.2 L25.8 27.8 M25.8 24.2 L22.2 27.8" stroke="#3a4350" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M38.2 24.2 L41.8 27.8 M41.8 24.2 L38.2 27.8" stroke="#3a4350" stroke-width="1.5" stroke-linecap="round"/>
</g>
<!-- Flames from the nose -->
<g>
  <path d="M32 44 C28 40 30 34 32 31 C34 34 36 40 32 44 Z" fill="#ff7a26"/>
  <path d="M32 43 C30 40 31 36 32 34 C33 36 34 40 32 43 Z" fill="#ffd23e"/>
  <path d="M26 46 C24 43 25 39 27 37 C28 40 28 44 26 46 Z" fill="#ff7a26"/>
</g>
</svg>
