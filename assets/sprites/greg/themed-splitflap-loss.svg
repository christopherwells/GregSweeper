<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Splitflap Greg, loss: the biplane down in a heap, both wings still stacked but buckled, the nose buried and well ablaze. -->
<!-- Black smoke billowing up -->
<g fill="#3a3d44" opacity="0.85">
  <circle cx="41" cy="15" r="6"/><circle cx="48" cy="9" r="4.6"/><circle cx="36" cy="8" r="3.8"/><circle cx="52" cy="4" r="3.2"/><circle cx="44" cy="3" r="2.6"/>
</g>
<g fill="#5a5e66" opacity="0.55"><circle cx="42" cy="13" r="2.8"/><circle cx="47" cy="8" r="2.2"/></g>
<!-- Wrecked biplane, nose buried, tilted; both wings present so the stacked silhouette still reads -->
<g transform="rotate(-16 32 36)">
  <!-- UPPER wing, snapped at the center, both halves still there -->
  <path d="M7 17 L29 16 L29 20 L8 21 Z" fill="#b8c0ca" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <path d="M35 16 L57 20 L56 24 L35 20 Z" fill="#a8b0ba" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <path d="M30 16 L32 19 M34 16 L33 19" stroke="#3a4350" stroke-width="1.2" stroke-linecap="round"/>
  <!-- struts, one buckled -->
  <g stroke="#3a4350" stroke-width="2" stroke-linecap="round"><path d="M15 21 L17 31"/><path d="M47 23 L44 31"/><path d="M27 20 L28 27"/></g>
  <!-- LOWER wing, bent, the right tip dug into the dirt -->
  <path d="M11 39 L30 38 L30 42 L12 43 Z" fill="#b8c0ca" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <path d="M34 38 L55 43 L52 47 L34 42 Z" fill="#a8b0ba" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <!-- bent tail fin -->
  <path d="M29 13 L33 12 L34 5 L30 7 Z" fill="#9aa4b0" stroke="#3a4350" stroke-width="2" stroke-linejoin="round"/>
  <!-- fuselage -->
  <path d="M17 32 C17 25 22 20 31 19 C44 20 48 25 48 32 C48 40 42 45 31 45 C21 45 17 40 17 32 Z" fill="#e6ebf0" stroke="#3a4350" stroke-width="2.4"/>
  <path d="M18 34 C23 40 27 42 31 42 C36 42 42 40 46 34 C43 39 38 40.5 31 40.5 C24 40.5 20 39 18 34 Z" fill="#3a78c8"/>
  <!-- hull cracks -->
  <path d="M25 22 L28 27 L24 31 M39 24 L36 29 L40 33" stroke="#3a4350" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- X cockpit windows -->
  <circle cx="24" cy="26" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
  <circle cx="38" cy="26" r="3.6" fill="#bfe0f0" stroke="#3a4350" stroke-width="2"/>
  <path d="M22.2 24.2 L25.8 27.8 M25.8 24.2 L22.2 27.8" stroke="#3a4350" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M36.2 24.2 L39.8 27.8 M39.8 24.2 L36.2 27.8" stroke="#3a4350" stroke-width="1.5" stroke-linecap="round"/>
</g>
<!-- Big fire engulfing the buried nose -->
<g>
  <path d="M18 51 C17 46 20 44 22 46 C22 40 26 39 27 44 C28 36 33 36 34 44 C35 37 39 38 40 45 C43 43 47 46 46 51 Z" fill="#ff7a26"/>
  <path d="M24 47 C22 43 23 38 25 36 C27 39 27 44 25 47 Z" fill="#ff9a36"/>
  <path d="M40 47 C38 43 39 39 41 37 C42 40 42 45 40 47 Z" fill="#ff9a36"/>
  <path d="M29 46 C26 41 30 33 32 29 C34 33 38 41 35 46 Z" fill="#ff7a26"/>
  <path d="M23 50 C22 46 24 44 26 46 C27 41 30 41 31 46 C32 42 35 43 36 47 C37 45 39 47 39 50 Z" fill="#ffd23e"/>
  <path d="M31 45 C29 41 31 35 32 32 C33 35 35 41 33 45 Z" fill="#ffd23e"/>
</g>
<!-- rising sparks -->
<g fill="#ffd23e"><circle cx="29" cy="27" r="1"/><circle cx="38" cy="30" r="0.9"/><circle cx="24" cy="33" r="0.8"/></g>
</svg>
