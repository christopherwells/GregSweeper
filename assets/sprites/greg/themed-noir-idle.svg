<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Noir Greg, idle: a detective in hard light, half the shell thrown into shadow, venetian-blind bars, a magnifier in the right claw. -->
<!-- Legs / arms / stalks, stark white -->
<g fill="none" stroke="#ececed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 41 L13 47 L11 52"/>
  <path d="M24 43.5 L20 50 L19 55"/>
  <path d="M45 41 L51 47 L53 52"/>
  <path d="M40 43.5 L44 50 L45 55"/>
  <path d="M17 32 L12 27"/>
  <path d="M47 32 L52 26"/>
  <path d="M25 18.5 L23 12.5"/>
  <path d="M39 18.5 L41 12.5"/>
</g>
<!-- Shell base (light) -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="#3a3a42"/>
<!-- Hard shadow half (chiaroscuro), clipped to the shell -->
<clipPath id="noirShell"><path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"/></clipPath>
<g clip-path="url(#noirShell)">
  <path d="M34 12 L60 38 L60 12 Z" fill="#121216"/>
  <path d="M30 46 L52 46 L52 30 Z" fill="#121216" opacity="0.85"/>
  <!-- venetian-blind bars -->
  <g stroke="#0c0c10" stroke-width="2.4" opacity="0.55">
    <path d="M8 22 L56 22"/>
    <path d="M8 28 L56 28"/>
    <path d="M8 34 L56 34"/>
    <path d="M8 40 L56 40"/>
  </g>
</g>
<!-- Shell outline on top -->
<path d="M11 31 C11 24 16 19 22 17.5 Q27 15 32 15 Q37 15 42 17.5 C48 19 53 24 53 31 C53 38 45 43 32 43 C19 43 11 38 11 31 Z"
      fill="none" stroke="#ececed" stroke-width="2.4"/>
<!-- Smile -->
<path d="M27.5 31.5 Q32 36.5 36.5 31.5" fill="none" stroke="#ececed" stroke-width="2" stroke-linecap="round"/>
<!-- Eyes, one catchlight -->
<circle cx="22.5" cy="9.5" r="4.2" fill="#ececed" stroke="#ececed" stroke-width="1"/>
<circle cx="41.5" cy="9.5" r="4.2" fill="#ececed"/>
<circle cx="23.2" cy="10.2" r="1.8" fill="#1a1a1f"/>
<circle cx="40.8" cy="10.2" r="1.8" fill="#1a1a1f"/>
<!-- Left claw + detective's notebook -->
<ellipse cx="14" cy="21" rx="5.6" ry="4.6" fill="#3a3a42" stroke="#ececed" stroke-width="2.2" transform="rotate(28 14 21)"/>
<g transform="rotate(-10 8 31)">
  <rect x="2" y="21" width="12" height="16" rx="1" fill="#26262c" stroke="#ececed" stroke-width="2"/>
  <path d="M4.5 26 L11.5 26 M4.5 29.5 L11.5 29.5 M4.5 33 L9 33" stroke="#ececed" stroke-width="1" opacity="0.7"/>
</g>
<!-- Right claw raising a magnifier -->
<ellipse cx="54" cy="22" rx="6" ry="4.8" fill="#3a3a42" stroke="#ececed" stroke-width="2.2" transform="rotate(-35 54 22)"/>
<circle cx="55" cy="13" r="6" fill="#1a1a1f" stroke="#ececed" stroke-width="2.2"/>
<circle cx="55" cy="13" r="6" fill="#9fd0e0" opacity="0.18"/>
<path d="M52 8 L54 11" stroke="#ececed" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
<path d="M50.8 17.2 L48 21" stroke="#c0392b" stroke-width="2.6" stroke-linecap="round"/>
</svg>
