<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Daily: the sun cresting the horizon behind a single fresh tile —
       every morning, one new board. (The inventory's "morning ritual"
       direction, without the calendar literal.) -->
  <!-- Sun rays -->
  <g stroke="#ffc83a" stroke-width="6" stroke-linecap="round">
    <path d="M64 14 L64 26"/>
    <path d="M30 26 L38 34"/>
    <path d="M98 26 L90 34"/>
    <path d="M16 56 L28 58"/>
    <path d="M112 56 L100 58"/>
  </g>
  <!-- Sun half-disk -->
  <path d="M30 72 A34 34 0 0 1 98 72 Z" fill="#ffc83a" stroke="#232838" stroke-width="6" stroke-linejoin="round"/>
  <path d="M40 64 A24 24 0 0 1 60 46" fill="none" stroke="#ffe28a" stroke-width="6" stroke-linecap="round"/>
  <!-- Horizon -->
  <path d="M10 72 L118 72" stroke="#232838" stroke-width="6" stroke-linecap="round"/>
  <!-- The day's single tile, raised and waiting -->
  <rect x="36" y="84" width="56" height="34" rx="8" fill="#dfe5ee" stroke="#232838" stroke-width="6"/>
  <rect x="36" y="84" width="56" height="13" rx="8" fill="#f3f6fb"/>
</svg>
