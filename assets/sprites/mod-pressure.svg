<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Pressure Plate: a cell with a countdown timer ticking. The red
       urgency + clock hand says "solve fast or it blows." -->
  <!-- Base plate (slightly depressed button look) -->
  <rect x="20" y="44" width="88" height="68" rx="10" fill="#c8d8ec" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
  <rect x="28" y="50" width="72" height="56" rx="6" fill="#dde6f0" stroke="#232838" stroke-width="3"/>
  <!-- Timer circle (top center, overlapping the plate) -->
  <circle cx="64" cy="44" r="28" fill="#e8e8e8" stroke="#232838" stroke-width="5"/>
  <circle cx="64" cy="44" r="22" fill="#f5f5f5"/>
  <!-- Clock hand -->
  <line x1="64" y1="44" x2="64" y2="28" stroke="#e4453a" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="44" x2="76" y2="44" stroke="#232838" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="64" cy="44" r="3.5" fill="#232838"/>
  <!-- Red warning glow at the bottom -->
  <circle cx="64" cy="92" r="8" fill="#e4453a" stroke="#232838" stroke-width="3.5"/>
  <circle cx="64" cy="92" r="4" fill="#ff6b6b"/>
</svg>
