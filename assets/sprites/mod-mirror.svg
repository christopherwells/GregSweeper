<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Mirror: two adjacent cells with swapped numbers, connected by a
       reflective surface between them. The dashed outline echoes the
       in-game mirror marker. -->
  <!-- Left cell -->
  <rect x="8" y="30" width="48" height="68" rx="7" fill="#c8d8ec" stroke="#232838" stroke-width="4.5" stroke-linejoin="round"/>
  <text x="32" y="76" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="34" fill="#3498db">3</text>
  <!-- Right cell -->
  <rect x="72" y="30" width="48" height="68" rx="7" fill="#c8d8ec" stroke="#232838" stroke-width="4.5" stroke-linejoin="round"/>
  <text x="96" y="76" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="34" fill="#3498db">1</text>
  <!-- Mirror surface between cells (reflective vertical line) -->
  <line x1="64" y1="24" x2="64" y2="104" stroke="#3498db" stroke-width="4" stroke-dasharray="8,5" opacity="0.85"/>
  <!-- Swap arrows -->
  <g stroke="#232838" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M44 38 Q58 28 72 38"/>
    <path d="M68 34 L72 38 L68 43"/>
    <path d="M84 90 Q70 100 56 90"/>
    <path d="M60 94 L56 90 L60 85"/>
  </g>
</svg>
