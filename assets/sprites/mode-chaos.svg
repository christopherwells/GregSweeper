<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Chaos: a violent vortex tearing tiles apart, lightning in the
       seams — aggressive where the wormhole modifier is "physics".
       Magenta-purple storm palette. -->
  <!-- Spiral arms -->
  <g fill="none" stroke-linecap="round">
    <path d="M64 64 C64 44 84 38 98 48 C88 42 72 46 70 60" stroke="#a04ad8" stroke-width="10"/>
    <path d="M64 64 C84 64 90 84 80 98 C86 88 82 72 68 70" stroke="#d050ff" stroke-width="10"/>
    <path d="M64 64 C44 64 38 44 48 30 C42 40 46 56 60 58" stroke="#7a2db0" stroke-width="10"/>
    <path d="M64 64 C64 84 44 90 30 80 C40 86 56 82 58 68" stroke="#b86ae8" stroke-width="10"/>
  </g>
  <circle cx="64" cy="64" r="9" fill="#2a0a3e" stroke="#d050ff" stroke-width="4"/>
  <!-- Torn tile shards flying out -->
  <g stroke="#232838" stroke-width="4" stroke-linejoin="round">
    <path d="M99 24 L113 28 L106 40 L95 34 Z" fill="#dfe5ee" transform="rotate(18 104 32)"/>
    <path d="M16 88 L29 86 L28 99 L17 99 Z" fill="#c2c9d6" transform="rotate(-14 22 92)"/>
  </g>
  <!-- Lightning -->
  <path d="M88 88 L78 102 L86 102 L74 118" fill="none" stroke="#ffd23e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
