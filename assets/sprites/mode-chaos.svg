<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Chaos: a roll of the dice — random modifiers every round, no
       guarantees. One die shows a mine as its center pip. -->
  <!-- Back die, mid-tumble -->
  <g transform="rotate(-18 44 52)">
    <rect x="20" y="28" width="48" height="48" rx="10" fill="#b86ae8" stroke="#232838" stroke-width="6"/>
    <circle cx="34" cy="42" r="5" fill="#2a0a3e"/>
    <circle cx="54" cy="62" r="5" fill="#2a0a3e"/>
  </g>
  <!-- Front die: the mine pip -->
  <g transform="rotate(12 80 80)">
    <rect x="54" y="54" width="52" height="52" rx="10" fill="#f3f6fb" stroke="#232838" stroke-width="6"/>
    <circle cx="66" cy="66" r="4.5" fill="#232838"/>
    <circle cx="94" cy="66" r="4.5" fill="#232838"/>
    <circle cx="66" cy="94" r="4.5" fill="#232838"/>
    <circle cx="94" cy="94" r="4.5" fill="#232838"/>
    <!-- Center pip is a tiny mine -->
    <circle cx="80" cy="80" r="6.5" fill="#2c3142"/>
    <path d="M80 70 L80 73 M80 87 L80 90 M70 80 L73 80 M87 80 L90 80" stroke="#2c3142" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Tumble arcs -->
  <g stroke="#d050ff" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M14 92 C18 102 26 110 36 114"/>
    <path d="M96 22 C106 26 114 34 118 44"/>
  </g>
</svg>
