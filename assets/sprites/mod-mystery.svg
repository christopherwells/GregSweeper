<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Mystery: a bold question mark rising from a cell. The number is
       hidden — you can see the cell but not its value. -->
  <!-- Cell background -->
  <rect x="22" y="36" width="84" height="76" rx="10" fill="#b0c4de" stroke="#232838" stroke-width="5" stroke-linejoin="round"/>
  <!-- Bold question mark -->
  <path d="M52 42 Q52 24 64 20 Q80 16 84 30 Q88 44 68 52 L66 62"
        fill="none" stroke="#232838" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="64" cy="76" r="5.5" fill="#232838"/>
  <!-- Haze/fog lines radiating from the question -->
  <g stroke="#7a8da6" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="36" y1="52" x2="28" y2="48"/>
    <line x1="36" y1="68" x2="26" y2="72"/>
    <line x1="92" y1="56" x2="102" y2="52"/>
    <line x1="92" y1="72" x2="100" y2="78"/>
  </g>
</svg>
