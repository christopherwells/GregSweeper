    </g>
    <g fill="none" stroke-linecap="round">
      <path d="M22 88 L14 96" stroke="#232838" stroke-width="10"/>
      <path d="M106 88 L112 96" stroke="#232838" stroke-width="10"/>
      <path d="M22 88 L14 96" stroke="#53a05b" stroke-width="5"/>
      <path d="M106 88 L112 96" stroke="#53a05b" stroke-width="5"/>
    </g>
    <ellipse cx="46" cy="24" rx="7" ry="8" fill="#53a05b" stroke="#232838" stroke-width="5"/>
    <ellipse cx="82" cy="24" rx="7" ry="8" fill="#53a05b" stroke="#232838" stroke-width="5"/>
    <path d="M14 68 C14 40 36 25 64 25 C92 25 114 40 114 68 C114 92 94 106 64 106 C34 106 14 92 14 68 Z"
