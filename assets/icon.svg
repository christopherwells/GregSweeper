<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="cellUnrevealed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4d7a"/>
      <stop offset="100%" stop-color="#2a3a5e"/>
    </linearGradient>
    <linearGradient id="cellRevealed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#141c30"/>
    </linearGradient>
    <radialGradient id="mineGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Outer glow border -->
  <rect x="4" y="4" width="504" height="504" rx="98" fill="none" stroke="#4a7bd4" stroke-width="3" opacity="0.3"/>

  <!-- 3x3 Grid of cells -->
  <!-- Row 1 -->
  <!-- Cell (0,0): unrevealed -->
  <rect x="76" y="76" width="106" height="106" rx="12" fill="url(#cellUnrevealed)" filter="url(#shadow)"/>
  <!-- Cell (0,1): revealed with "1" -->
  <rect x="196" y="76" width="106" height="106" rx="12" fill="url(#cellRevealed)"/>
  <text x="249" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#4a90d9">1</text>
  <!-- Cell (0,2): unrevealed with flag -->
  <rect x="316" y="76" width="106" height="106" rx="12" fill="url(#cellUnrevealed)" filter="url(#shadow)"/>
  <g transform="translate(369,112)">
    <rect x="-2" y="0" width="4" height="44" rx="2" fill="#888"/>
    <path d="M2,0 L24,12 L2,24 Z" fill="#e94560"/>
  </g>

  <!-- Row 2 -->
  <!-- Cell (1,0): revealed with "2" -->
  <rect x="76" y="196" width="106" height="106" rx="12" fill="url(#cellRevealed)"/>
  <text x="129" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#44aa44">2</text>
  <!-- Cell (1,1): MINE (center, dramatic) -->
  <rect x="196" y="196" width="106" height="106" rx="12" fill="url(#cellRevealed)"/>
  <circle cx="249" cy="249" r="50" fill="url(#mineGlow)"/>
  <g transform="translate(249,249)">
    <!-- Mine body -->
    <circle r="22" fill="#333"/>
    <circle r="18" fill="#444"/>
    <!-- Spikes -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <!-- Highlight -->
    <circle cx="-5" cy="-5" r="6" fill="#888" opacity="0.6"/>
  </g>
  <!-- Cell (1,2): revealed with "3" -->
  <rect x="316" y="196" width="106" height="106" rx="12" fill="url(#cellRevealed)"/>
  <text x="369" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#e94560">3</text>

  <!-- Row 3 -->
  <!-- Cell (2,0): unrevealed -->
  <rect x="76" y="316" width="106" height="106" rx="12" fill="url(#cellUnrevealed)" filter="url(#shadow)"/>
  <!-- Cell (2,1): revealed with "1" -->
  <rect x="196" y="316" width="106" height="106" rx="12" fill="url(#cellRevealed)"/>
  <text x="249" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#4a90d9">1</text>
  <!-- Cell (2,2): unrevealed -->
  <rect x="316" y="316" width="106" height="106" rx="12" fill="url(#cellUnrevealed)" filter="url(#shadow)"/>
</svg>
