<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GregSweeper — Gimmick Debug</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
    h1 { font-size: 18px; margin-bottom: 10px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; justify-content: center; }
    .controls button { padding: 8px 16px; border: 2px solid #444; border-radius: 8px; background: #2a2a4e; color: #eee; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .controls button:hover { border-color: #e94560; }
    .controls button.active { border-color: #e94560; background: #e94560; color: #fff; }
    .info { font-size: 13px; color: #aaa; margin-bottom: 12px; text-align: center; }
    .info strong { color: #e94560; }
    #board { display: inline-grid; gap: 2px; margin-bottom: 12px; }
    .cell { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 700; font-size: 16px; cursor: pointer; user-select: none; border: 1px solid #3a3a5e; transition: all 0.15s; position: relative; }
    .cell.unrevealed { background: #2a2a4e; }
    .cell.unrevealed:hover { background: #3a3a6e; }
    .cell.revealed { background: #1a1a2e; cursor: default; }
    .cell.mine { background: #e94560; }
    .cell.mine-hit { background: #ff2244; }
    .cell.flagged { background: #2a2a4e; }
    .cell.defused { background: #2a4a2a; }
    .cell.empty { color: transparent; }
    /* Number colors */
    .cell.n1 { color: #5b9bd5; } .cell.n2 { color: #66bb6a; } .cell.n3 { color: #ef5350; }
    .cell.n4 { color: #ab47bc; } .cell.n5 { color: #ec407a; } .cell.n6 { color: #26c6da; }
    .cell.n7 { color: #bdbdbd; } .cell.n8 { color: #90a4ae; }
    /* Gimmick styles */
    .cell.liar-cell { border: 2px solid #e67e22; }
    .cell.mystery-cell { color: #aaa; font-style: italic; }
    .cell.locked-cell::after { content: '🔒'; position: absolute; font-size: 16px; opacity: 0.5; }
    .wall-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
    .wall-line { position: absolute; background: #c9a96e; border-radius: 1px; }
    .wall-line-h { height: 5px; transform: translateY(-50%); margin-left: -1px; padding-right: 2px; box-sizing: content-box; }
    .wall-line-v { width: 5px; transform: translateX(-50%); margin-top: -1px; padding-bottom: 2px; box-sizing: content-box; }
    .cell.pressure-plate { box-shadow: inset 0 0 8px rgba(255,50,50,0.4); border-color: rgba(255,80,80,0.6); }
    .cell.sonar-cell { border: 2px solid rgba(38,198,218,0.6); font-size: 12px; }
    .cell.compass-cell { border: 2px solid rgba(255,167,38,0.6); font-size: 12px; }
    .plate-timer { position: absolute; bottom: 1px; left: 1px; right: 1px; height: 3px; background: #ff4444; border-radius: 1px; transform-origin: left; transition: transform 0.2s linear; }
    #status { font-size: 15px; margin-bottom: 8px; min-height: 24px; }
    #status.win { color: #66bb6a; } #status.loss { color: #ef5350; }
    .mine-count { font-size: 14px; color: #aaa; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>🧪 Gimmick Debug — 6×6 Boards</h1>
  <div class="controls" id="gimmick-buttons"></div>
  <div class="info" id="info"></div>
  <div class="mine-count" id="mine-count"></div>
  <div id="status"></div>
  <div id="board"></div>

  <script type="module">
    import { generateBoard, createEmptyBoard, placeMines, calculateAdjacency } from './src/logic/boardGenerator.js';
    import { isBoardSolvable, floodFillReveal, chordReveal, checkWin } from './src/logic/boardSolver.js';
    import { applyGimmicks, applyWalls, hasWallBetween, isLockedCell, getGimmickDef } from './src/logic/gimmicks.js';

    const ROWS = 7, COLS = 7, MINES = 10;
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const infoEl = document.getElementById('info');
    const mineCountEl = document.getElementById('mine-count');
    const btnContainer = document.getElementById('gimmick-buttons');

    const GIMMICK_LIST = ['walls', 'liar', 'mystery', 'locked', 'wormhole', 'mirror', 'pressurePlate', 'sonar', 'compass'];
    let activeGimmick = 'walls';
    let board = null;
    let gimmickData = {};
    let gameOver = false;
    let firstClick = true;
    let flagCount = 0;
    let activePlateTimers = new Map();

    // Build gimmick selector buttons
    for (const g of GIMMICK_LIST) {
      const def = getGimmickDef(g);
      const btn = document.createElement('button');
      btn.textContent = (def?.icon || '?') + ' ' + (def?.name || g);
      btn.dataset.gimmick = g;
      btn.addEventListener('click', () => {
        activeGimmick = g;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        startGame();
      });
      if (g === activeGimmick) btn.classList.add('active');
      btnContainer.appendChild(btn);
    }

    function startGame() {
      gameOver = false;
      firstClick = true;
      flagCount = 0;
      board = null;
      gimmickData = {};
      activePlateTimers.forEach(t => clearInterval(t));
      activePlateTimers.clear();
      statusEl.textContent = '';
      statusEl.className = '';
      const def = getGimmickDef(activeGimmick);
      infoEl.innerHTML = `<strong>${def?.icon} ${def?.name}</strong>: ${def?.desc || ''}`;
      mineCountEl.textContent = `Mines: ${MINES} | Flags: 0`;
      boardEl.style.gridTemplateColumns = `repeat(${COLS}, 44px)`;
      boardEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell unrevealed';
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.addEventListener('click', () => handleClick(r, c));
          cell.addEventListener('contextmenu', (e) => { e.preventDefault(); handleFlag(r, c); });
          boardEl.appendChild(cell);
        }
      }
    }

    function handleClick(row, col) {
      if (gameOver) { startGame(); return; }
      const cell = board?.[row]?.[col];
      if (cell && cell.isRevealed && cell.adjacentMines > 0) { handleChord(row, col); return; }
      if (cell && cell.isRevealed) return;
      if (cell && cell.isFlagged) return;

      if (firstClick) {
        // Use a level past each gimmick's intro so intensity is meaningful
        const def = getGimmickDef(activeGimmick);
        const testLevel = def ? def.intro + 3 : 50; // 3 levels into the intro block = intensity 4

        // Fast rejection sampling: random board + gimmick, retry until:
        // 1. Gimmick cells spawned
        // 2. Solvable by solver
        // 3. No wall-isolated dead zones (every cell reachable from first click via flood fill)
        let solved = false, gc = 0;

        // Check that all non-mine cells are reachable from the start cell
        // through wall-respecting flood fill. If walls create isolated pockets,
        // those cells can only be solved via global mine counting — reject.
        function hasIsolatedCells(b, startR, startC) {
          const wEdges = b._wallEdges || null;
          if (!wEdges || wEdges.size === 0) return false;
          const visited = new Set();
          const queue = [`${startR},${startC}`];
          visited.add(queue[0]);
          while (queue.length > 0) {
            const [r, c] = queue.shift().split(',').map(Number);
            for (let dr = -1; dr <= 1; dr++) {
              for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                const nr = r + dr, nc = c + dc;
                const key = `${nr},${nc}`;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited.has(key)) {
                  if (!hasWallBetween(wEdges, r, c, nr, nc)) {
                    visited.add(key);
                    queue.push(key);
                  }
                }
              }
            }
          }
          // Every non-mine cell must be reachable
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              if (!b[r][c].isMine && !visited.has(`${r},${c}`)) return true;
            }
          }
          return false;
        }

        for (let attempt = 0; attempt < 200; attempt++) {
          const b = createEmptyBoard(ROWS, COLS);
          placeMines(b, MINES, row, col);
          calculateAdjacency(b);
          const gd = applyGimmicks(b, testLevel, [activeGimmick], Math.random);

          // Count gimmick cells
          gc = 0;
          for (const v of Object.values(gd)) {
            if (Array.isArray(v)) gc += v.length;
            else if (v instanceof Set) gc += v.size;
            else if (v && typeof v === 'object') {
              // Mirror returns {cells: [...]} , mineShift returns {interval: N}
              if (v.cells) gc += v.cells.length;
              else if (v.interval) gc = 1;
            }
          }
          if (activeGimmick === 'walls' && b._wallEdges) gc = b._wallEdges.size;
          if (gc === 0) continue;

          // Reject boards where walls create isolated pockets
          if (hasIsolatedCells(b, row, col)) continue;

          // Solvability check
          const check = isBoardSolvable(b, ROWS, COLS, row, col);
          for (const brow of b) for (const c of brow) { c.isRevealed = false; c.revealAnimDelay = 0; }
          if (check.solvable || check.remainingUnknowns === 0) {
            board = b; gimmickData = gd; solved = true; break;
          }
        }
        // If no solvable board found, generate a plain one without gimmicks as fallback
        if (!solved) {
          board = createEmptyBoard(ROWS, COLS);
          placeMines(board, MINES, row, col);
          calculateAdjacency(board);
          gimmickData = {};
          gc = 0;
        }
        const gLabel = def?.name || activeGimmick;
        statusEl.textContent = solved
          ? `✅ Solvable | ${gc} ${gLabel} ${activeGimmick === 'walls' ? 'edges' : 'cells'}`
          : `⚠️ Not solvable | ${gc} ${gLabel} ${activeGimmick === 'walls' ? 'edges' : 'cells'}`;
        statusEl.className = solved ? 'win' : 'loss';

        // Simulate the first-click cascade and strip pressure plates from revealed cells
        // (plates shouldn't appear in the opening — player should discover them while exploring)
        if (activeGimmick === 'pressurePlate' && board) {
          const simBoard = board;
          // Temporarily reveal the first click cascade
          const cascade = (simBoard[row][col].adjacentMines === 0)
            ? floodFillReveal(simBoard, row, col)
            : [simBoard[row][col]];
          // Mark cascade cells + their revealed neighbors
          for (const cell of cascade) cell._inOpening = true;
          // Also mark numbered cells adjacent to the cascade (they get revealed too)
          for (const cell of cascade) {
            if (cell.adjacentMines === 0) {
              for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                  const nr = cell.row + dr, nc = cell.col + dc;
                  if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                    simBoard[nr][nc]._inOpening = true;
                  }
                }
              }
            }
          }
          // Strip pressure plates from cells in the opening
          for (let r = 0; r < ROWS; r++) {
            for (let c2 = 0; c2 < COLS; c2++) {
              if (simBoard[r][c2]._inOpening && simBoard[r][c2].isPressurePlate) {
                simBoard[r][c2].isPressurePlate = false;
              }
              delete simBoard[r][c2]._inOpening;
            }
          }
          // Reset reveals for actual gameplay
          for (const brow of simBoard) for (const c2 of brow) { c2.isRevealed = false; c2.revealAnimDelay = 0; }
        }

        firstClick = false;
      }

      const c = board[row][col];
      if (c.isLocked && isLockedCell(board, row, col)) { statusEl.textContent = '🔒 Locked! Reveal safe neighbors first.'; return; }
      if (c.isMine) { endGame(false, row, col); return; }

      if (c.adjacentMines === 0) {
        const revealed = floodFillReveal(board, row, col);
      } else {
        c.isRevealed = true;
      }

      // Wormhole: revealing one side reveals the paired cell too
      if (c.isWormhole && c.wormholePair) {
        const pair = board[c.wormholePair.row]?.[c.wormholePair.col];
        if (pair && !pair.isRevealed && !pair.isMine) {
          pair.isRevealed = true;
          if (pair.adjacentMines === 0) floodFillReveal(board, pair.row, pair.col);
        }
      }

      // Pressure plate timer
      if (c.isPressurePlate && !c.plateDisarmed) {
        startPlateTimer(c);
      }

      tryUnlockCells();
      renderBoard();
      renderWalls();
      if (checkWin(board)) endGame(true);
    }

    function handleFlag(row, col) {
      if (gameOver || !board) return;
      const c = board[row][col];
      if (c.isRevealed) return;
      if (c.isLocked && isLockedCell(board, row, col)) return;
      c.isFlagged = !c.isFlagged;
      flagCount += c.isFlagged ? 1 : -1;
      mineCountEl.textContent = `Mines: ${MINES} | Flags: ${flagCount}`;
      tryUnlockCells();
      renderBoard();
      renderWalls();
      if (checkWin(board)) endGame(true);
    }

    function handleChord(row, col) {
      if (!board) return;
      const result = chordReveal(board, row, col);
      if (!result || !result.revealed) return;
      if (result.hitMine) {
        const mine = result.revealed.find(c => c.isMine);
        if (mine) { endGame(false, mine.row, mine.col); renderWalls(); }
        return;
      }
      // Check pressure plates in newly revealed
      for (const c of result.revealed) {
        if (c.isPressurePlate && !c.plateDisarmed) startPlateTimer(c);
      }
      tryUnlockCells();
      renderBoard();
      renderWalls();
      if (checkWin(board)) endGame(true);
    }

    function startPlateTimer(cell) {
      const cellEl = boardEl.children[cell.row * COLS + cell.col];
      const bar = document.createElement('div');
      bar.className = 'plate-timer';
      cellEl.appendChild(bar);
      const start = Date.now();
      const duration = (cell.plateTimer || 15) * 1000;
      const timer = setInterval(() => {
        if (gameOver) { clearInterval(timer); return; }
        const elapsed = Date.now() - start;
        const remaining = Math.max(0, (duration - elapsed) / 1000);
        const pct = remaining / (duration / 1000);
        bar.style.transform = `scaleX(${pct})`;
        // Show countdown in the cell
        const cellEl2 = boardEl.children[cell.row * COLS + cell.col];
        if (cellEl2 && remaining > 0) {
          cellEl2.textContent = Math.ceil(remaining) + 's';
          cellEl2.style.color = remaining < 5 ? '#ff4444' : '#ffaa44';
          cellEl2.style.fontWeight = '900';
        }
        // Check if disarmed
        if (checkPlateDisarmed(cell)) {
          clearInterval(timer);
          activePlateTimers.delete(cell);
          cell.plateDisarmed = true;
          bar.remove();
          statusEl.textContent = '✅ Plate disarmed!';
          return;
        }
        if (pct <= 0) {
          clearInterval(timer);
          activePlateTimers.delete(cell);
          endGame(false, cell.row, cell.col);
        }
      }, 100);
      activePlateTimers.set(cell, timer);
    }

    function checkPlateDisarmed(cell) {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = cell.row + dr, nc = cell.col + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            if (board[nr][nc].isMine && board[nr][nc].isFlagged) return true;
          }
        }
      }
      return false;
    }

    function endGame(won, hitR, hitC) {
      gameOver = true;
      activePlateTimers.forEach(t => clearInterval(t));
      activePlateTimers.clear();
      if (won) {
        statusEl.textContent = '🎉 You won! Click to play again.';
        statusEl.className = 'win';
      } else {
        statusEl.textContent = '💥 Mine hit! Click to try again.';
        statusEl.className = 'loss';
        if (hitR != null) board[hitR][hitC].isRevealed = true;
        // Reveal all mines
        for (const row of board) for (const c of row) { if (c.isMine) c.isRevealed = true; }
      }
      renderBoard();
    }

    function renderBoard() {
      if (!board) return;
      const wallEdges = board._wallEdges || null;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = board[r][c];
          const el = boardEl.children[r * COLS + c];
          el.className = 'cell';

          // (walls rendered as overlays below)

          if (cell.isRevealed) {
            if (cell.isMine) {
              const isHit = gameOver && !checkWin(board);
              el.classList.add('revealed', isHit ? 'mine-hit' : 'mine');
              el.textContent = '💣';
            } else if (cell.isDefused) {
              el.classList.add('revealed', 'defused');
              el.textContent = '💣';
            } else {
              const num = cell.displayedMines != null ? cell.displayedMines
                : cell.isMystery ? null : cell.adjacentMines;
              if (cell.isMystery && num == null) {
                el.classList.add('revealed', 'mystery-cell');
                el.textContent = '?';
              } else if (num > 0) {
                el.classList.add('revealed', 'n' + Math.min(num, 8));
                if (cell.isSonar) {
                  el.textContent = '📡' + num;
                  el.classList.add('sonar-cell');
                } else if (cell.isCompass) {
                  el.textContent = num + (cell.compassArrow || '');
                  el.classList.add('compass-cell');
                } else {
                  el.textContent = num;
                }
                if (cell.isLiar) el.classList.add('liar-cell');
                if (cell.isPressurePlate && !cell.plateDisarmed) el.classList.add('pressure-plate');
                if (cell.isWormhole) {
                  const pairColors = ['#9b59b6', '#e74c3c', '#f39c12'];
                  const pc = pairColors[cell.wormholePairIndex || 0];
                  el.style.border = '2px solid ' + pc;
                  el.style.boxShadow = 'inset 0 0 6px ' + pc + '55';
                  el.textContent = '🌀' + el.textContent;
                  el.style.fontSize = '11px';
                }
                if (cell.mirrorZone) {
                  el.style.border = '2px solid #e67e22';
                  el.textContent = el.textContent + '🪞';
                  el.style.fontSize = '11px';
                }
              } else {
                el.classList.add('revealed', 'empty');
                el.textContent = '';
              }
            }
          } else if (cell.isFlagged) {
            el.classList.add('unrevealed', 'flagged');
            el.textContent = '🚩';
          } else {
            el.classList.add('unrevealed');
            el.textContent = '';
            if (cell.isLocked) el.classList.add('locked-cell');
            if (cell.isWormhole) {
              const pairColors = ['#9b59b6', '#e74c3c', '#f39c12'];
              el.style.border = '2px dashed ' + (pairColors[cell.wormholePairIndex || 0]) + '88';
            }
            if (cell.mirrorZone) {
              el.style.border = '2px dashed rgba(230,126,34,0.5)';
            }
          }
        }
      }
    }

    // Auto-unlock locked cells whose non-locked safe neighbors are all revealed.
    // Cascades: unlocking one may free adjacent locked cells.
    function tryUnlockCells() {
      if (!board) return;
      let progress = true;
      while (progress) {
        progress = false;
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const cell = board[r][c];
            if (cell.isLocked && !cell.isRevealed && !cell.isFlagged && !isLockedCell(board, r, c)) {
              // Clear the permanent flag so floodFill/chord/rendering all work correctly
              cell.isLocked = false;
              if (!cell.isMine) {
                cell.isRevealed = true;
                progress = true;
                if (cell.adjacentMines === 0) floodFillReveal(board, r, c);
              }
              // Unlocked mines: leave unrevealed, player flags them
            }
          }
        }
      }
    }

    function renderWalls() {
      const old = boardEl.parentElement?.querySelector('.wall-overlay');
      if (old) old.remove();
      if (!board?._wallEdges?.size) return;

      const wrapper = boardEl.parentElement || boardEl;
      wrapper.style.position = 'relative';
      const overlay = document.createElement('div');
      overlay.className = 'wall-overlay';

      const cellW = 44, cellH = 44, gap = 2;
      const offX = boardEl.offsetLeft, offY = boardEl.offsetTop;

      for (const key of board._wallEdges) {
        const [from, to] = key.split('-');
        const [r1, c1] = from.split(',').map(Number);
        const [r2, c2] = to.split(',').map(Number);
        const line = document.createElement('div');
        line.className = 'wall-line';
        if (r1 === r2) {
          const minC = Math.min(c1, c2);
          line.classList.add('wall-line-v');
          line.style.left = (offX + (minC + 1) * (cellW + gap) - gap / 2) + 'px';
          line.style.top = (offY + r1 * (cellH + gap)) + 'px';
          line.style.height = cellH + 'px';
        } else {
          const minR = Math.min(r1, r2);
          line.classList.add('wall-line-h');
          line.style.left = (offX + c1 * (cellW + gap)) + 'px';
          line.style.top = (offY + (minR + 1) * (cellH + gap) - gap / 2) + 'px';
          line.style.width = cellW + 'px';
        }
        overlay.appendChild(line);
      }
      wrapper.appendChild(overlay);
    }

    startGame();
  </script>
</body>
</html>
