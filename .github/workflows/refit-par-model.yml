name: Refit Greg-par

# Runs the Greg-par regression daily, patches src/logic/difficulty.js
# between its PAR_MODEL:START / PAR_MODEL:END markers, and pushes the
# change straight to master (GitHub Pages then redeploys automatically).
#
# 10am America/New_York is 14:00 UTC in EDT and 15:00 UTC in EST. GitHub
# Actions cron does not observe DST, so the pinned 14:00 UTC slot fires at
# 10am ET in summer and 9am ET in winter — close enough for a daily refit.
# Change the cron if you move timezones.
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refit-par-model
  cancel-in-progress: false

jobs:
  refit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          # Bump the suffix whenever the package list OR the runner OS
          # changes — binary R packages built against one Ubuntu release
          # won't load on another (Apr 2026: ubuntu-latest moved Jammy ->
          # Noble and the cached jammy `rlang.so` started erroring with
          # `undefined symbol: SETLENGTH`). Including ubuntu-version in
          # the key forces a clean reinstall whenever the runner shifts.
          key: r-pkgs-${{ runner.os }}-noble-brms-v2
          restore-keys: r-pkgs-${{ runner.os }}-noble-

      - name: Install R packages
        shell: Rscript {0}
        run: |
          # Use the system-detected RSPM URL set by r-lib/actions/setup-r
          # so we get noble binaries on noble runners and jammy on jammy.
          # Hardcoding the path was the previous bug — when the runner
          # OS shifted, the install pulled jammy binaries onto a noble
          # system and dyn.load failed.
          rspm <- Sys.getenv("RSPM")
          if (nzchar(rspm)) options(repos = c(CRAN = rspm))
          pkgs <- c("jsonlite", "dplyr", "tidyr", "purrr", "stringr",
                    "brms", "posterior", "rstan", "StanHeaders")
          need <- setdiff(pkgs, rownames(installed.packages()))
          if (length(need)) install.packages(need)

      - name: Refit PAR_MODEL
        # brms compiles a fresh Stan model at runtime (~30-60s) on top of
        # the sampling time; budget ~3 min for the whole run.
        timeout-minutes: 10
        run: Rscript scripts/refit-par-model.R

      - name: Commit and push if anything changed
        run: |
          if git diff --quiet src/logic/difficulty.js src/logic/handicaps.json src/logic/experimentTarget.json; then
            echo "No model, handicap, or experiment-target changes — nothing to commit."
            exit 0
          fi
          git config user.name  "Christopher Wells"
          git config user.email "c.wells@bowdoin.edu"
          git add src/logic/difficulty.js src/logic/handicaps.json src/logic/experimentTarget.json
          git commit -m "refit PAR_MODEL, handicaps, and experiment target — $(date -u +%Y-%m-%d)"
          git push
