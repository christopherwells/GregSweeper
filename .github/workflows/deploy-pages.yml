name: Deploy GitHub Pages

# Single workflow that publishes both main (production) and test
# (development) to GitHub Pages in one artifact:
#   main content     →   https://christopherwells.github.io/GregSweeper/
#   test branch      →   https://christopherwells.github.io/GregSweeper/test/
#
# Triggered by push to either branch — both rebuild the same artifact
# (we always pull the latest of BOTH branches) so a main push doesn't
# stale the test directory and vice versa.
#
# One-time setup: in repo Settings → Pages, switch Source from "Deploy
# from a branch" to "GitHub Actions". Until that flip happens, this
# workflow runs but its deployment step has nowhere to publish.

on:
  push:
    branches: [main, test]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Self-hosted Windows runner on the dev box (label gregsweeper-win):
    # zero GitHub-hosted minutes. Git Bash provides bash/tar; Node is
    # used in place of jq (not on Windows). Pending until the runner is
    # online, which costs no minutes.
    runs-on: [self-hosted, gregsweeper-win]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-content
          fetch-depth: 1

      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: test
          path: test-content
          fetch-depth: 1

      - name: Compose site
        run: |
          set -euo pipefail
          mkdir -p _site
          # Copy main contents into root. Use tar for clean dotfile
          # handling and to exclude .git / .github + any stray test/
          # directory at main root (so it can't conflict with the
          # subdir we're about to place).
          (cd main-content && tar c \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='test' \
            .) | (cd _site && tar x)
          # Place test branch contents under /test/.
          mkdir -p _site/test
          (cd test-content && tar c \
            --exclude='.git' \
            --exclude='.github' \
            .) | (cd _site/test && tar x)
          # Rewrite the test deployment's manifest so it installs as a
          # SEPARATE PWA (different id) with a distinct name + orange
          # theme color matching the test banner. Keeping the in-branch
          # manifest.json identical to main means future test→main
          # merges don't accidentally carry these test-only changes
          # into production. Done in Node (jq is not on the Windows
          # self-hosted runner; Node is always present).
          node -e '
            const fs = require("fs");
            const p = "_site/test/manifest.json";
            const m = JSON.parse(fs.readFileSync(p, "utf8"));
            m.name = "GregSweeper Test";
            m.short_name = "GregSweeper Test";
            m.id = "gregsweeper-test";
            m.description = "Test build of GregSweeper — scores not saved. Daily/weekly play limits removed for repeat-play testing.";
            m.theme_color = "#f59e0b";
            fs.writeFileSync(p, JSON.stringify(m, null, 2));
          '

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: [self-hosted, gregsweeper-win]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
