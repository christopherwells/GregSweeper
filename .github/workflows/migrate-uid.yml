name: Migrate uid

on:
  workflow_dispatch:
    inputs:
      sourceUid:
        description: 'Source uid (will be DELETED after migration)'
        required: true
        type: string
      targetUid:
        description: 'Target uid (will receive source data)'
        required: true
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firebase-admin
        run: npm install firebase-admin@12
      - name: Migrate
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/migrate-uid.mjs "${{ inputs.sourceUid }}" "${{ inputs.targetUid }}"
