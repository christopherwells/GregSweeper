name: Precompute daily board

# Pre-generates the next 7 ET days of canonical daily boards and writes
# them to Firebase BEFORE any player loads. The 7-day horizon lets
# clients pre-fetch a full week so dailies stay playable through bad
# service / offline stretches. This also eliminates the "first player
# of the day" race: without it, whoever loads first would generate
# locally with whatever code+experimentTarget they have cached and
# stamp THAT board as canonical, which means players on slightly
# different cached state could diverge until the SW catches up.
#
# Cron: 03:00 UTC = 22:00 ET (winter) / 23:00 ET (summer), about an
# hour before midnight ET. Earlier versions ran at 00:00 UTC, which
# meant the canonical board was readable on Firebase ~4-5 hours BEFORE
# the daily actually opened to players — enough time for a determined
# attacker to fetch the board, run boardSolver.js offline, and pre-compute
# the click sequence for a guaranteed sub-par solve. The 03:00 UTC cron
# trims that pre-solve window to ~1 hour while keeping enough buffer to
# retry if Firebase / network is flaky.
#
# The script is idempotent: write-once Firebase rules will reject
# duplicate writes silently, so re-running is safe.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Single date to pre-generate (YYYY-MM-DD). Blank = the next 7 days ET.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: precompute-daily-board
  cancel-in-progress: false

jobs:
  precompute:
    # MUST be GitHub-hosted: this writes the canonical daily board on a
    # fixed cron BEFORE players load. A self-hosted runner only runs
    # when the dev box is on; if it's asleep at 03:00 UTC the board
    # never gets created and players diverge. Reliability over minutes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Pre-generate and upload (7-day horizon)
        env:
          OVERRIDE_DATE: ${{ github.event.inputs.date }}
        run: |
          # Generate the next 7 ET days so clients can pre-fetch a full
          # week of boards for offline play. Each date is idempotent
          # (write-once Firebase rules + the script's existsCanonicalBoard
          # short-circuit), so in steady state only the +7 date is newly
          # generated each night; the other six skip immediately.
          if [ -n "$OVERRIDE_DATE" ]; then
            echo "Manual single-date run: $OVERRIDE_DATE"
            node scripts/precompute-daily-board.mjs "$OVERRIDE_DATE"
          else
            FAILED=""
            for i in $(seq 1 7); do
              DATE=$(TZ=America/New_York date -d "+$i day" '+%Y-%m-%d')
              echo "=== Pre-generating $DATE (offset +$i) ==="
              if ! node scripts/precompute-daily-board.mjs "$DATE"; then
                FAILED="$FAILED $DATE"
              fi
            done
            if [ -n "$FAILED" ]; then
              echo "Failed dates:$FAILED"
              exit 1
            fi
          fi

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"content\":\":warning: GregSweeper workflow FAILED: ${{ github.workflow }} (run ${{ github.run_id }}, 7-day daily horizon)\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
