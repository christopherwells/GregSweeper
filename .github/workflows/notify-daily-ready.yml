name: Send daily/weekly push notifications

# Hourly cron that sends push notifications to subscribers whose chosen
# ET hour matches the current ET hour. send-push.mjs reads each user's
# notificationPrefs.hourLocal from Firebase and only sends to matches —
# so each subscriber gets at most one push per day, at the time they
# picked in Settings.
#
# workflow_dispatch lets you trigger manually for testing; it'll only
# fire to subscribers whose hourLocal matches the current ET hour.
#
# Required secrets:
#   FIREBASE_SERVICE_ACCOUNT — full service-account JSON (one line).
#     Used to mint OAuth2 access tokens for FCM and read users/*.
#     Generate via Firebase Console → Project Settings → Service Accounts.

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: send-push
  cancel-in-progress: false

jobs:
  send:
    # MUST be GitHub-hosted: hourly cron that sends each subscriber
    # their "daily is ready" push at their chosen ET hour. A self-hosted
    # runner only runs when the dev box is on, so a sleeping machine
    # means players miss that day's reminder. Reliability over minutes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Send push notifications for the current ET hour
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/send-push.mjs

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"content\":\":warning: GregSweeper workflow FAILED: ${{ github.workflow }} (run ${{ github.run_id }})\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
