name: Inspect user record

on:
  workflow_dispatch:
    inputs:
      uid:
        description: 'Firebase anonymous uid to inspect (e.g. 5Ht9d2io0ugU...)'
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firebase-admin
        run: npm install firebase-admin@12
      - name: Inspect
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/inspect-user-record.mjs "${{ inputs.uid }}"
