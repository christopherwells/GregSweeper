name: Deploy Firebase Rules

# Auto-deploys firebase-rules.json to the Realtime Database when the rules
# file (or firebase.json) is modified on main. Closes the manual-deploy
# discipline gap that CSec flagged: a rules-file change in the repo is no
# longer dependent on Christopher running `firebase deploy --only database`
# from his laptop. Manual trigger also available via workflow_dispatch.
#
# Required secret: FIREBASE_SERVICE_ACCOUNT (already configured for the
# push-notification workflow per CLAUDE.md).
# Optional secret: DISCORD_WEBHOOK_URL — failure pings will route here.

on:
  push:
    branches: [main]
    paths:
      - 'firebase-rules.json'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, gregsweeper-win]
    defaults:
      run:
        shell: '"C:\Program Files\Git\bin\bash.exe" --noprofile --norc -eo pipefail "{0}"'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Write service-account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is not set — cannot deploy" >&2
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy database rules
        run: firebase deploy --only database --project gregsweeper-66d02 --non-interactive

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"content\":\":warning: Firebase rules deploy FAILED in $GITHUB_REPOSITORY (run $GITHUB_RUN_ID, commit $GITHUB_SHA)\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
