name: Precompute weekly board

# Pre-generates the next two Mondays' canonical weekly boards and writes
# them to Firebase BEFORE any player starts the week. The 2-week horizon
# lets clients cache the current AND next week so the weekly stays
# playable across a week boundary while offline. Same correctness
# story as precompute-daily-board.yml: without this, whoever opens the
# Weekly card first on Monday morning would generate locally and stamp
# THEIR board as canonical, splitting the player base for the whole
# week if any code/experiment-target cache is stale.
#
# Cron: 00:00 UTC every Monday. Goal: land BEFORE the week flips at
# 00:00 ET Monday (= 04:00 UTC summer / 05:00 UTC winter), so 00:00
# UTC Monday gives a 4-5h buffer to retry if Firebase/network is flaky.
#
# The script is idempotent: write-once Firebase rules silently reject
# duplicates, so re-running is safe.

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      weekStart:
        description: 'Single week start (YYYY-MM-DD Monday). Blank = this coming Monday + the one after.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: precompute-weekly-board
  cancel-in-progress: false

jobs:
  precompute:
    # MUST be GitHub-hosted: writes the canonical weekly board on a
    # fixed Monday cron before players start the week. A self-hosted
    # runner only runs when the dev box is on; a missed run forks the
    # weekly board for everyone. Reliability over minutes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Pre-generate and upload (2-week horizon)
        env:
          OVERRIDE_WEEK: ${{ github.event.inputs.weekStart }}
        run: |
          # Generate the next two Mondays so a client always has the
          # current week PLUS next week cached — enough to stay playable
          # across a week boundary while offline. Idempotent via write-once
          # rules + the script's existsCanonicalBoard short-circuit.
          if [ -n "$OVERRIDE_WEEK" ]; then
            echo "Manual single-week run: $OVERRIDE_WEEK"
            node scripts/precompute-weekly-board.mjs "$OVERRIDE_WEEK"
          else
            # The cron fires Monday 00:00 UTC = ~7-8pm Sunday ET, so
            # "next Monday" is ~5-6 hours away — that's the week to seed.
            WK1=$(TZ=America/New_York date -d 'next Monday' '+%Y-%m-%d')
            WK2=$(TZ=America/New_York date -d "$WK1 +7 day" '+%Y-%m-%d')
            FAILED=""
            for WK in "$WK1" "$WK2"; do
              echo "=== Pre-generating weekly $WK ==="
              if ! node scripts/precompute-weekly-board.mjs "$WK"; then
                FAILED="$FAILED $WK"
              fi
            done
            if [ -n "$FAILED" ]; then
              echo "Failed weeks:$FAILED"
              exit 1
            fi
          fi

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"content\":\":warning: GregSweeper workflow FAILED: ${{ github.workflow }} (run ${{ github.run_id }}, 2-week weekly horizon)\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
